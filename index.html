function onTrialCategoryChange() {
  const cat = $('ef-eventCategory') ? $('ef-eventCategory').value : ''
  $$('.tf-visit, .tf-consent, .tf-ae, .tf-dev').forEach(el => el.classList.remove('tf-show'))
  if (cat === 'Visit' || cat === '') $$('.tf-visit').forEach(el => el.classList.add('tf-show'))
  if (cat === 'Consent / Re-consent') $$('.tf-consent').forEach(el => el.classList.add('tf-show'))
  if (cat === 'Adverse Event (AE)' || cat === 'Serious Adverse Event (SAE)') $$('.tf-ae').forEach(el => el.classList.add('tf-show'))
  if (cat === 'Protocol Deviation') $$('.tf-dev').forEach(el => el.classList.add('tf-show'))
}
function submitTrialEntry() {
  const get = (k) => { const el = $(`ef-${k}`); return el ? el.value.trim() : '' }
  const cat = get('eventCategory') || 'Visit'
  const e = {
    id: uid(), ts: Date.now(), role: STATE.role, user: STATE.user,
    eventCategory: cat,
    participantId: get('participantId'),
    site: get('site'),
    eventDate: get('eventDate'),
    notes: get('notes'),
  }
  // Category-specific
  if (cat === 'Visit' || cat === '') {
    e.visitName = get('visitName')
    e.visitDate = e.eventDate || get('visitDate')
    e.scheduledDate = get('scheduledDate')
    e.attended = get('attended')
    e.distance = get('distance')
  } else if (cat === 'Consent / Re-consent') {
    e.icfVersion = get('icfVersion')
    e.currentIcfVersion = get('currentIcfVersion')
  } else if (cat.includes('Adverse Event')) {
    e.aeTerm = get('aeTerm')
    e.aeSeverity = get('aeSeverity')
    e.aeOnset = get('aeOnset')
    e.aeReported = get('aeReported')
    e.isSAE = cat === 'Serious Adverse Event (SAE)'
  } else if (cat === 'Protocol Deviation') {
    e.devType = get('devType')
    e.devSeverity = get('devSeverity')
  }
  STATE.entries.push(e); STORAGE.saveEntries(STATE.role, STATE.entries)
  audit('Trial event logged', `${cat} · ${e.participantId}`)

  const cards = analyseTrialEvent(e)
  if (cards.length > 0) {
    cards.forEach(c => STATE.cards.push(c))
    STORAGE.saveCards(STATE.role, STATE.cards)
    toast(`${cards.length} decision${cards.length > 1 ? 's' : ''} generated`, cards[0].title, cards[0].severity)
  } else {
    toast('Event recorded', 'No anomaly detected', 'good')
  }
  goPage('dashboard')
}

function analyseTrialEvent(e) {
  const cards = []
  const cat = e.eventCategory || 'Visit'

  // ── ENGINE 1: Visit attendance / retention ──
  if (cat === 'Visit') {
    const card = analyseVisitEvent(e)
    if (card) cards.push(card)
    // Visit-window compliance
    const winCard = analyseVisitWindow(e)
    if (winCard) cards.push(winCard)
  }

  // ── ENGINE 2: Consent version mismatch ──
  if (cat === 'Consent / Re-consent') {
    const card = analyseConsentEvent(e)
    if (card) cards.push(card)
  }

  // ── ENGINE 3: AE/SAE reporting clock ──
  if (cat.includes('Adverse Event')) {
    const card = analyseAEEvent(e)
    if (card) cards.push(card)
  }

  // ── ENGINE 4: Protocol deviation ──
  if (cat === 'Protocol Deviation') {
    const card = analyseDeviationEvent(e)
    if (card) cards.push(card)
  }

  // ── ENGINE 5: Consent currency check (runs on every event) ──
  // Has the participant ever signed the latest ICF?
  const consentCheckCard = checkConsentCurrency(e)
  if (consentCheckCard) cards.push(consentCheckCard)

  return cards
}

function analyseVisitEvent(e) {
  if (e.attended !== 'No — missed' && e.attended !== 'Withdrew') return null
  const history = STATE.entries.filter(x => x.role === 'Trial' && x.participantId === e.participantId && x.eventCategory === 'Visit' && x.id !== e.id)
  const noShows = history.filter(h => h.attended === 'No — missed').length + 1
  const total = history.length + 1
  const rate = total > 0 ? Math.round((noShows / total) * 100) : 0
  const severity = e.attended === 'Withdrew' ? 'crit' : (noShows >= 2 ? 'crit' : 'warn')
  const distance = parseFloat(e.distance) || 0
  return {
    id: uid(), ts: Date.now(), role: 'Trial', severity, source: 'Retention Engine',
    title: `${e.participantId} ${e.attended === 'Withdrew' ? 'withdrew' : `missed ${e.visitName}`}`,
    description: `${e.participantId} at ${e.site} ${e.attended === 'Withdrew' ? 'withdrew' : `missed ${e.visitName} on ${e.visitDate} — no-show #${noShows} of ${total} (${rate}%)`}.`,
    signals: [
      { label: 'Participant', value: e.participantId, tone: 'red' },
      { label: 'Site', value: e.site, tone: 'blue' },
      { label: 'No-shows', value: `${noShows}/${total}`, tone: noShows >= 2 ? 'red' : 'amber' },
      { label: 'Miss rate', value: rate + '%', tone: rate > 30 ? 'red' : 'amber' },
      { label: 'Distance', value: distance + ' km', tone: distance > 30 ? 'amber' : 'blue' },
      { label: 'LTFU risk', value: noShows >= 2 ? 'HIGH' : 'MODERATE', tone: noShows >= 2 ? 'red' : 'amber' },
    ],
    insight: `${noShows >= 2 ? 'Multiple missed visits classify this participant as high-risk for loss-to-follow-up.' : 'Single missed visits require active follow-up.'}${distance > 30 ? ' Distance exceeds 30km — known retention barrier.' : ''}`,
    rootCause: [
      { stage: 'Engagement', cause: 'Participant may be disengaging from study' },
      distance > 20 ? { stage: 'Logistics', cause: `Distance (${distance}km) likely barrier to attendance` } : { stage: 'Communication', cause: 'Reminder system may have failed' },
      e.attended === 'Withdrew' ? { stage: 'Adverse event', cause: 'Investigate whether withdrawal relates to AE or trial burden' } : { stage: 'Personal', cause: 'Unknown reason — requires direct contact' },
    ].filter(Boolean),
    actions: [
      'Phone contact within 24 hours · document outcome',
      'Send SMS reminder for next visit in preferred language',
      distance > 20 ? 'Arrange transport voucher or coordinated transport' : 'Confirm contact details and reminder method',
      noShows >= 2 ? 'Schedule home visit by community study coordinator' : 'Document barrier in retention log',
      e.attended === 'Withdrew' ? 'File compliant withdrawal documentation; update IRB if required' : '',
    ].filter(Boolean),
    trace: `Trial_Visit → ${e.participantId} → Retention_Engine → Card`, acknowledged: false,
  }
}

function analyseVisitWindow(e) {
  if (!e.scheduledDate || !e.visitDate || e.attended !== 'Yes — attended') return null
  const scheduled = new Date(e.scheduledDate)
  const actual = new Date(e.visitDate)
  if (isNaN(scheduled.getTime()) || isNaN(actual.getTime())) return null
  const diffDays = Math.round((actual - scheduled) / 86400000)
  // Most protocols allow ±3 to ±7 days; flag beyond ±7
  const TH_VW_WARN = (STATE.thresholds && STATE.thresholds.visitWindow && STATE.thresholds.visitWindow.warnDays) || 7
  const TH_VW_CRIT = (STATE.thresholds && STATE.thresholds.visitWindow && STATE.thresholds.visitWindow.critDays) || 14
  if (Math.abs(diffDays) <= TH_VW_WARN) return null
  const severity = Math.abs(diffDays) > TH_VW_CRIT ? 'crit' : 'warn'
  const direction = diffDays > 0 ? 'late' : 'early'
  return {
    id: uid(), ts: Date.now(), role: 'Trial', severity, source: 'Visit Window Engine',
    title: `${e.participantId} · ${e.visitName} ${Math.abs(diffDays)} days ${direction}`,
    description: `Visit conducted on ${e.visitDate} but was scheduled for ${e.scheduledDate} — ${Math.abs(diffDays)} days outside the ±7 day window typical for most protocols.`,
    signals: [
      { label: 'Participant', value: e.participantId, tone: 'red' },
      { label: 'Scheduled', value: e.scheduledDate, tone: 'blue' },
      { label: 'Actual', value: e.visitDate, tone: 'red' },
      { label: 'Variance', value: `${diffDays > 0 ? '+' : ''}${diffDays}d`, tone: 'red' },
    ],
    insight: 'Out-of-window visits are protocol deviations. They affect data interpretability (PK/PD timing, exposure calculations, primary endpoint windows) and are reported to the IRB and sponsor. Beyond ±14 days the visit data may be unusable.',
    rootCause: [
      { stage: 'Scheduling', cause: 'Visit window enforcement may be insufficient' },
      { stage: 'Logistics', cause: 'Participant or site availability constraints' },
    ],
    actions: [
      'File a protocol deviation in eTMF immediately',
      'Notify the site monitor of out-of-window visit',
      'Confirm whether endpoint data from this visit is usable per protocol',
      'Update visit-window reminders to prevent recurrence',
      Math.abs(diffDays) > 14 ? 'Discuss with sponsor whether to repeat the visit assessments' : '',
    ].filter(Boolean),
    trace: `Trial_Visit → ${e.participantId} → Visit_Window → Card`, acknowledged: false,
  }
}

function analyseConsentEvent(e) {
  if (!e.icfVersion || !e.currentIcfVersion) return null
  if (e.icfVersion === e.currentIcfVersion) {
    // Consent currency confirmed — no card needed
    return null
  }
  return {
    id: uid(), ts: Date.now(), role: 'Trial', severity: 'crit', source: 'Consent Engine',
    title: `${e.participantId} consented on outdated ICF version`,
    description: `Participant signed ICF ${e.icfVersion} but the current protocol version is ${e.currentIcfVersion}. Re-consent is required before continuing trial activities.`,
    signals: [
      { label: 'Participant', value: e.participantId, tone: 'red' },
      { label: 'Signed', value: e.icfVersion, tone: 'red' },
      { label: 'Current', value: e.currentIcfVersion, tone: 'blue' },
    ],
    insight: 'ICF version mismatches are the #1 reason for trial suspension by regulators. Data collected from a participant who has not re-consented to the current protocol is technically unusable. ICH-GCP requires re-consent whenever the protocol changes in ways that materially affect participant interests.',
    rootCause: [
      { stage: 'Consent management', cause: 'No automated re-consent workflow for protocol updates' },
      { stage: 'Site training', cause: 'Site coordinators may be unaware of latest ICF version' },
    ],
    actions: [
      'Stop all trial activities for this participant immediately',
      'Schedule re-consent visit with current ICF version',
      'Document the consent gap in eTMF and CRF',
      'Flag any data collected since the protocol change for sponsor review',
      'Notify IRB if data collection continued without valid consent',
    ],
    trace: `Trial_Consent → ${e.participantId} → Consent_Engine → Card`, acknowledged: false,
  }
}

function checkConsentCurrency(e) {
  // For any non-consent event, check if the participant has ever consented to current ICF
  if (e.eventCategory === 'Consent / Re-consent') return null
  if (!e.participantId) return null
  const consents = STATE.entries.filter(x => x.role === 'Trial' && x.participantId === e.participantId && x.eventCategory === 'Consent / Re-consent')
  if (consents.length === 0) {
    return {
      id: uid(), ts: Date.now(), role: 'Trial', severity: 'crit', source: 'Consent Currency Engine',
      title: `${e.participantId} has no consent record in JLIGHT`,
      description: `An event was logged for ${e.participantId} but no consent record exists. ICH-GCP requires consent before any trial procedure.`,
      signals: [
        { label: 'Participant', value: e.participantId, tone: 'red' },
        { label: 'Event', value: e.eventCategory, tone: 'red' },
      ],
      insight: 'Performing trial procedures on an unconsented participant is a serious GCP violation. Either consent was obtained but not logged in JLIGHT, or consent was never obtained.',
      rootCause: [
        { stage: 'Consent', cause: 'Consent log entry may be missing or out of order' },
      ],
      actions: [
        'Verify consent file in eTMF immediately',
        'If consent exists, log it retroactively in JLIGHT',
        'If no consent exists, halt all activities and notify IRB',
      ],
      trace: `Trial_Event → ${e.participantId} → Consent_Currency → Card`, acknowledged: false,
    }
  }
  return null
}

function analyseAEEvent(e) {
  const isSAE = e.isSAE || e.eventCategory === 'Serious Adverse Event (SAE)'
  const reported = e.aeReported || 'Not yet'
  const onset = e.aeOnset ? new Date(e.aeOnset) : null
  const now = new Date()
  const hoursSinceOnset = onset ? (now - onset) / 3600000 : 0

  // SAE reporting clock: 24 hours per ICH-GCP
  if (isSAE) {
    if (reported === 'Not yet' && hoursSinceOnset > 0) {
      const SAE_DEADLINE = (STATE.thresholds && STATE.thresholds.sae && STATE.thresholds.sae.hoursDeadline) || 24
      const overdue = hoursSinceOnset > SAE_DEADLINE
      const severity = overdue ? 'crit' : 'warn'
      return {
        id: uid(), ts: Date.now(), role: 'Trial', severity, source: 'SAE Reporting Engine',
        title: overdue ? `SAE NOT YET REPORTED · ${hoursSinceOnset.toFixed(1)}h since onset · OVERDUE` : `SAE reporting clock active · ${hoursSinceOnset.toFixed(1)}h elapsed`,
        description: `${e.participantId} experienced a Serious Adverse Event "${e.aeTerm}" (severity: ${e.aeSeverity}). Sponsor notification deadline is ${SAE_DEADLINE}h.${overdue ? ' This SAE is now overdue.' : ` ${(SAE_DEADLINE - hoursSinceOnset).toFixed(1)} hours remaining.`}`,
        signals: [
          { label: 'Participant', value: e.participantId, tone: 'red' },
          { label: 'Event', value: e.aeTerm, tone: 'red' },
          { label: 'Severity', value: e.aeSeverity, tone: 'red' },
          { label: 'Hours since onset', value: hoursSinceOnset.toFixed(1) + 'h', tone: overdue ? 'red' : 'amber' },
          { label: SAE_DEADLINE + 'h deadline', value: overdue ? 'BREACHED' : ((SAE_DEADLINE - hoursSinceOnset).toFixed(1) + 'h left'), tone: overdue ? 'red' : 'amber' },
        ],
        insight: 'Late SAE reporting is one of the most common causes of trial suspension by regulators. ICH E2A and E2B require unexpected fatal/life-threatening SAEs to be reported within 7 calendar days, with follow-up within 8 days. Other SAEs require reporting within 15 days. Most sponsors require initial notification within 24 hours regardless.',
        rootCause: [
          { stage: 'Reporting workflow', cause: 'No automated SAE notification trigger to sponsor' },
          { stage: 'Site awareness', cause: 'Site staff may be unaware of the 24h reporting clock' },
        ],
        actions: [
          'Notify sponsor immediately via the protocol-specified SAE form',
          'File CIOMS form or sponsor-specific SAE report',
          'Update IRB within country-specific timelines (typically 7 days)',
          'Document onset, action taken, outcome in CRF',
          'Confirm participant safety and ongoing care',
          overdue ? 'Document the reason for late reporting in eTMF deviation log' : '',
        ].filter(Boolean),
        trace: `Trial_SAE → ${e.participantId} → SAE_Engine → Card`, acknowledged: false,
      }
    }
    if (reported === 'Reported late') {
      return {
        id: uid(), ts: Date.now(), role: 'Trial', severity: 'crit', source: 'SAE Reporting Engine',
        title: `Late SAE reporting · ${e.participantId}`,
        description: `SAE for ${e.participantId} (${e.aeTerm}) was reported outside the 24-hour window. This is a reportable protocol deviation.`,
        signals: [
          { label: 'Participant', value: e.participantId, tone: 'red' },
          { label: 'Event', value: e.aeTerm, tone: 'red' },
          { label: 'Status', value: 'Reported late', tone: 'red' },
        ],
        insight: 'Late SAE reporting must be documented as a deviation. Repeat occurrences trigger sponsor audit and potentially trial suspension.',
        rootCause: [{ stage: 'Reporting workflow', cause: 'Reporting clock missed' }],
        actions: [
          'File a protocol deviation in eTMF',
          'Document the reason for the delay',
          'Implement training to prevent recurrence',
          'Sponsor audit may be triggered',
        ],
        trace: `Trial_SAE → ${e.participantId} → SAE_Engine → Card`, acknowledged: false,
      }
    }
  }

  // Non-SAE — informational tracking, only flag if pattern emerges
  const aeHistory = STATE.entries.filter(x => x.role === 'Trial' && x.participantId === e.participantId && x.eventCategory === 'Adverse Event (AE)')
  if (aeHistory.length >= 3) {
    return {
      id: uid(), ts: Date.now(), role: 'Trial', severity: 'warn', source: 'AE Pattern Engine',
      title: `${e.participantId} · ${aeHistory.length} AEs reported`,
      description: `Participant has reported ${aeHistory.length} adverse events. Pattern review recommended for safety signal detection.`,
      signals: [
        { label: 'Participant', value: e.participantId, tone: 'amber' },
        { label: 'Total AEs', value: String(aeHistory.length), tone: 'amber' },
        { label: 'Latest', value: e.aeTerm, tone: 'amber' },
      ],
      insight: 'Multiple AEs in a single participant may indicate a study drug safety signal, an underlying condition, or a tolerability issue requiring investigator review.',
      rootCause: [
        { stage: 'Safety', cause: 'Possible study drug safety signal' },
        { stage: 'Clinical', cause: 'Underlying participant condition may be evolving' },
      ],
      actions: [
        'Investigator to review AE timeline and pattern',
        'Discuss continued participation at next site visit',
        'Consider safety review board notification if pattern is severe',
        'Document review in CRF',
      ],
      trace: `Trial_AE → ${e.participantId} → AE_Pattern → Card`, acknowledged: false,
    }
  }
  return null
}

function analyseDeviationEvent(e) {
  const severity = e.devSeverity === 'Major' ? 'crit' : 'warn'

}

function submitHospitalEntry() {
  const get = (k) => { const el = $(`ef-${k}`); return el ? el.value.trim() : '' }
  const e = {
    id: uid(), ts: Date.now(), role: STATE.role, user: STATE.user,
    eventType: get('eventType'), ward: get('ward'), patientId: get('patientId'),
    eventTime: get('eventTime'), operator: get('operator'), notes: get('notes'),
    priority: get('priority'), tatHours: get('tatHours'), specimenTest: get('specimenTest'),
    pathogen: get('pathogen'), haiSite: get('haiSite'),
    hisCount: get('hisCount'), labCount: get('labCount'), reconPeriod: get('reconPeriod'),
  }
  STATE.entries.push(e); STORAGE.saveEntries(STATE.role, STATE.entries)
  audit('Hospital event logged', `${e.eventType} · ${e.ward}`)

  const cards = analyseHospitalEvent(e)
  if (cards.length > 0) {
    cards.forEach(c => STATE.cards.push(c))
    STORAGE.saveCards(STATE.role, STATE.cards)
    toast(`${cards.length} decision${cards.length > 1 ? 's' : ''} generated`, cards[0].title, cards[0].severity)
  } else {
    toast('Event recorded', 'No anomaly detected', 'good')
  }
  goPage('dashboard')
}

function analyseHospitalEvent(e) {
  const cards = []
  // ENGINE 1: TAT (existing logic, refactored)
  const tatCard = analyseTAT(e)
  if (tatCard) cards.push(tatCard)
  // ENGINE 2: HAI cluster detection
  const haiCard = analyseHAI(e)
  if (haiCard) cards.push(haiCard)
  // ENGINE 3: Cross-system completeness
  const completeCard = analyseCompleteness(e)
  if (completeCard) cards.push(completeCard)
  // ENGINE 4: Patient journey gap (result-to-action)
  const journeyCard = analyseJourneyGap(e)
  if (journeyCard) cards.push(journeyCard)
  return cards
}

function analyseTAT(e) {
  const tat = parseFloat(e.tatHours)
  if (isNaN(tat) || !['Specimen received', 'Result delivered'].includes(e.eventType)) return null
  const thresholds = (STATE.thresholds && STATE.thresholds.tat) || { Stat: 1, Urgent: 4, Routine: 24 }
  const threshold = thresholds[e.priority] || 24
  if (tat <= threshold) return null
  const variance = tat - threshold
  const severity = tat > threshold * 2 ? 'crit' : 'warn'
  const wardHistory = STATE.entries.filter(x => x.role === 'Hospital' && x.ward === e.ward && x.priority === e.priority && x.id !== e.id)
  const wardTATs = wardHistory.map(h => parseFloat(h.tatHours)).filter(v => !isNaN(v))
  const wardAvg = wardTATs.length ? (wardTATs.reduce((a, b) => a + b, 0) / wardTATs.length) : tat
  return {
    id: uid(), ts: Date.now(), role: 'Hospital', severity, source: 'TAT Engine',
    title: `${e.priority} TAT breach in ${e.ward} — ${tat.toFixed(1)}h`,
    description: `${e.eventType} for patient ${e.patientId} took ${tat.toFixed(1)}h, exceeding ${threshold}h threshold by ${variance.toFixed(1)}h.`,
    signals: [
      { label: 'Ward', value: e.ward, tone: 'blue' },
      { label: 'Priority', value: e.priority, tone: severity === 'crit' ? 'red' : 'amber' },
      { label: 'Actual TAT', value: tat.toFixed(1) + 'h', tone: 'red' },
      { label: 'Threshold', value: threshold + 'h', tone: 'blue' },
      { label: 'Variance', value: '+' + variance.toFixed(1) + 'h', tone: 'red' },
      { label: 'Ward avg', value: wardAvg.toFixed(1) + 'h', tone: wardAvg > threshold ? 'amber' : 'blue' },
    ],
    insight: wardAvg > threshold ? `${e.ward} has a sustained TAT issue — ward average (${wardAvg.toFixed(1)}h) exceeds threshold. Systemic, not isolated.` : 'Possible isolated delay; monitor next 5 events.',
    rootCause: [
      { stage: 'Pre-analytical', cause: 'Specimen collection or transport delay upstream of lab' },
      { stage: 'Processing', cause: wardAvg > threshold ? 'Lab capacity bottleneck for this ward/priority' : 'Possible isolated processing delay' },
      { stage: 'Post-analytical', cause: 'Result may have been delivered late or not acted upon promptly' },
    ],
    actions: [
      `Review ${e.ward} workflow for this time period`,
      'Verify result was acted on at delivery time',
      'Check upstream specimen collection and transport timing',
      e.priority === 'Stat' ? 'Escalate to ward sister and on-call physician immediately' : '',
      wardAvg > threshold ? 'Open a CAPA — recurring ward-level issue' : 'Monitor next 5 events',
    ].filter(Boolean),
    trace: `Hosp_Event → ${e.ward} → ${e.priority} → TAT_Engine → Card`, acknowledged: false,
  }
}

function analyseHAI(e) {
  if (!['HAI suspected', 'HAI confirmed'].includes(e.eventType)) return null
  if (!e.pathogen || e.pathogen === 'Other') return null

  // Look for cluster: same pathogen + same ward + last 14 days
  const TH_HAI_DAYS = (STATE.thresholds && STATE.thresholds.haiCluster && STATE.thresholds.haiCluster.sameWardWindowDays) || 14
  const TH_HAI_WARN = (STATE.thresholds && STATE.thresholds.haiCluster && STATE.thresholds.haiCluster.clusterSizeWarn) || 2
  const TH_HAI_CRIT = (STATE.thresholds && STATE.thresholds.haiCluster && STATE.thresholds.haiCluster.clusterSizeCrit) || 3
  const cutoff = Date.now() - TH_HAI_DAYS * 86400000
  const cluster = STATE.entries.filter(x =>
    x.role === 'Hospital' &&
    ['HAI suspected', 'HAI confirmed'].includes(x.eventType) &&
    x.pathogen === e.pathogen &&
    x.ward === e.ward &&
    x.ts >= cutoff &&
    x.id !== e.id
  )
  const clusterSize = cluster.length + 1

  // High-priority pathogens always trigger card; cluster of 2+ on any pathogen triggers
  const HIGH_PRIORITY = ['MRSA', 'VRE', 'CRE / CRKP', 'C. difficile', 'Acinetobacter baumannii', 'Candida auris', 'VRSA']
  const isHighPriority = HIGH_PRIORITY.includes(e.pathogen)
  if (clusterSize < 2 && !isHighPriority) return null

  const severity = clusterSize >= TH_HAI_CRIT ? 'crit' : (clusterSize >= TH_HAI_WARN || isHighPriority ? 'warn' : 'info')
  return {
    id: uid(), ts: Date.now(), role: 'Hospital', severity, source: 'HAI Surveillance Engine',
    title: clusterSize >= TH_HAI_WARN ? `${e.pathogen} cluster in ${e.ward} · ${clusterSize} cases in 14 days` : `${e.pathogen} detected in ${e.ward} · high-priority pathogen`,
    description: `${e.pathogen} ${e.eventType.toLowerCase()} in patient ${e.patientId}. ${clusterSize >= 2 ? `${clusterSize} cases of this pathogen detected in ${e.ward} over the past 14 days — possible outbreak.` : 'Single case but pathogen is on the high-priority surveillance list.'} Site: ${e.haiSite || 'unspecified'}.`,
    signals: [
      { label: 'Pathogen', value: e.pathogen, tone: 'red' },
      { label: 'Ward', value: e.ward, tone: 'red' },
      { label: 'Site', value: e.haiSite || 'unspecified', tone: 'blue' },
      { label: 'Cases (14d)', value: String(clusterSize), tone: clusterSize >= 3 ? 'red' : 'amber' },
      { label: 'Priority', value: isHighPriority ? 'HIGH' : 'STANDARD', tone: isHighPriority ? 'red' : 'blue' },
    ],
    insight: `Healthcare-associated infections (HAIs) are a leading cause of preventable hospital mortality. Multidrug-resistant pathogens like MRSA, VRE, CRE, and Candida auris require immediate isolation and contact tracing. Two or more cases of the same pathogen in the same ward within 14 days meet the standard CDC/WHO definition of a probable outbreak.`,
    rootCause: [
      { stage: 'Infection control', cause: 'Hand hygiene compliance may be insufficient' },
      { stage: 'Environment', cause: 'Environmental contamination of shared equipment or surfaces' },
      { stage: 'Patient flow', cause: 'Inadequate isolation of index case or contact patients' },
      clusterSize >= 3 ? { stage: 'Outbreak', cause: 'Active transmission likely — declare outbreak per protocol' } : null,
    ].filter(Boolean),
    actions: [
      'Place patient in contact isolation immediately per IPC protocol',
      'Notify the Infection Prevention & Control team',
      `Initiate contact tracing for ${e.ward} patients and staff`,
      'Increase environmental cleaning frequency with sporicidal agent (esp. C.diff)',
      'Reinforce hand hygiene · audit compliance',
      clusterSize >= 3 ? 'Declare outbreak per institutional policy · notify public health authorities' : '',
      clusterSize >= 2 ? 'Review antimicrobial stewardship program for affected ward' : '',
      'Document case in HAI surveillance register',
    ].filter(Boolean),
    trace: `Hosp_HAI → ${e.ward} → ${e.pathogen} → Surveillance → Card`, acknowledged: false,
  }
}

function analyseCompleteness(e) {
  if (e.eventType !== 'Census reconciliation') return null
  const his = parseInt(e.hisCount, 10)
  const lab = parseInt(e.labCount, 10)
  if (isNaN(his) || isNaN(lab)) return null
  const gap = his - lab
  if (gap <= 0) return null  // No missing data

  // Gap of 2+ = silent failure
  const severity = gap >= 5 ? 'crit' : 'warn'
  return {
    id: uid(), ts: Date.now(), role: 'Hospital', severity, source: 'Completeness Engine',
    title: `${gap} patient${gap > 1 ? 's' : ''} on ${e.ward} have no specimen recorded`,
    description: `Hospital Information System lists ${his} patients on ${e.ward}, but the laboratory has only received specimens from ${lab}. Gap of ${gap} patient${gap > 1 ? 's' : ''} — these patients may have unordered or untracked tests.`,
    signals: [
      { label: 'Ward', value: e.ward, tone: 'red' },
      { label: 'HIS census', value: String(his), tone: 'blue' },
      { label: 'Lab specimens', value: String(lab), tone: 'amber' },
      { label: 'Gap', value: String(gap), tone: 'red' },
      { label: 'Period', value: e.reconPeriod || 'shift', tone: 'blue' },
    ],
    insight: `This is the silent-failure problem. Most healthcare error-detection systems can only see what is entered — they cannot see what is missing. A patient who needs blood cultures, a CD4 count, or a creatinine but never gets one will not appear as an error in any LIS or HIS until something goes wrong clinically. The completeness engine catches these by comparing what JLIGHT receives against what should exist.`,
    rootCause: [
      { stage: 'Order entry', cause: 'Tests may not have been ordered for these patients' },
      { stage: 'Specimen collection', cause: 'Specimens may have been collected but lost in transit' },
      { stage: 'Lab receipt', cause: 'Specimens may have arrived but were not registered' },
      { stage: 'Communication', cause: 'Ward and lab data may simply not be reconciled regularly' },
    ],
    actions: [
      `Identify the ${gap} patient${gap > 1 ? 's' : ''} without recorded specimens — review HIS roster for ${e.ward}`,
      'For each patient: confirm whether tests were ordered and whether specimens were collected',
      'If tests were not ordered: clinical review at ward round',
      'If specimens were collected but not received: investigate transport chain',
      'Implement daily ward-lab reconciliation as standard process',
      severity === 'crit' ? 'Escalate to ward sister and lab manager immediately' : '',
    ].filter(Boolean),
    trace: `Hosp_Census → ${e.ward} → Completeness_Engine → Card`, acknowledged: false,
  }
}

function analyseJourneyGap(e) {
  if (e.eventType !== 'Result delivered') return null
  if (!e.patientId) return null
  // Find the result-delivered timestamp; check if any 'Clinical action taken' event followed within 4h
  const deliveryTime = e.eventTime ? new Date(e.eventTime).getTime() : Date.now()
  // Look forward in entries for clinical action; or note that this is the latest event
  const followup = STATE.entries.filter(x =>
    x.role === 'Hospital' &&
    x.patientId === e.patientId &&
    x.eventType === 'Clinical action taken' &&
    x.eventTime && new Date(x.eventTime).getTime() > deliveryTime &&
    new Date(x.eventTime).getTime() - deliveryTime < 8 * 3600000  // within 8 hours
  )
  // We can only retrospectively detect gaps for STAT priority results delivered > 4h ago with no action
  if (e.priority !== 'Stat') return null
  if (followup.length > 0) return null
  // Check if delivery was > 4 hours ago — if so, the gap is real
  const hoursSinceDelivery = (Date.now() - deliveryTime) / 3600000
  if (hoursSinceDelivery < 4) return null

  return {
    id: uid(), ts: Date.now(), role: 'Hospital', severity: 'crit', source: 'Patient Journey Engine',
    title: `STAT result delivered ${hoursSinceDelivery.toFixed(1)}h ago — no clinical action recorded for ${e.patientId}`,
    description: `A STAT result was delivered for patient ${e.patientId} in ${e.ward}, but no follow-up clinical action has been logged. Clinical action gap detected.`,
    signals: [
      { label: 'Patient', value: e.patientId, tone: 'red' },
      { label: 'Ward', value: e.ward, tone: 'blue' },
      { label: 'Hours since delivery', value: hoursSinceDelivery.toFixed(1) + 'h', tone: 'red' },
      { label: 'Priority', value: 'Stat', tone: 'red' },
    ],
    insight: 'A STAT result that does not lead to a clinical action is an indicator of post-analytical failure. Either the result reached the ward but was not seen, or it was seen but not acted on. This is one of the most under-measured failure modes in hospital quality. The Patient Journey Engine watches for the gap between result delivery and clinical action.',
    rootCause: [
      { stage: 'Post-analytical', cause: 'Result may not have been reviewed by responsible clinician' },
      { stage: 'Notification', cause: 'Critical-value notification protocol may have failed' },
      { stage: 'Documentation', cause: 'Action may have been taken but not logged in the system' },
    ],
    actions: [
      `Contact ward to verify whether action was taken for ${e.patientId}`,
      'If action was taken, log it retroactively to close the loop',
      'If no action was taken, escalate to on-call physician immediately',
      'Review critical-value read-back protocol at next quality meeting',
      'Document outcome in patient record',
    ],
    trace: `Hosp_Journey → ${e.patientId} → Journey_Engine → Card`, acknowledged: false,
  }
}

function renderTimeChart(items) {
  if (!items.length) return '<div style="text-align:center;color:var(--text-3);padding:32px;font-size:12px">No data yet</div>'
  const days = {}
  for (let i = 29; i >= 0; i--) { const d = new Date(Date.now() - i * 86400000); days[d.toISOString().split('T')[0]] = 0 }
  items.forEach(e => { const k = new Date(e.ts).toISOString().split('T')[0]; if (k in days) days[k]++ })
  const data = Object.values(days), labels = Object.keys(days)
  const max = Math.max(...data, 1) * 1.2
  const W = 700, H = 220, pL = 36, pR = 12, pT = 16, pB = 32
  const points = data.map((v, i) => [pL + (i / (data.length - 1)) * (W - pL - pR), H - pB - (v / max) * (H - pT - pB)])
  const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ')
  const fillD = `${pathD} L${points[points.length-1][0].toFixed(1)},${H-pB} L${points[0][0].toFixed(1)},${H-pB} Z`
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:220px"><defs><linearGradient id="cf" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#00C9A7" stop-opacity="0.25"/><stop offset="100%" stop-color="#00C9A7" stop-opacity="0"/></linearGradient></defs><line x1="${pL}" y1="${H-pB}" x2="${W-pR}" y2="${H-pB}" stroke="rgba(255,255,255,0.07)"/><line x1="${pL}" y1="${pT}" x2="${pL}" y2="${H-pB}" stroke="rgba(255,255,255,0.07)"/><path d="${fillD}" fill="url(#cf)"/><path d="${pathD}" fill="none" stroke="#00C9A7" stroke-width="2"/>${points.map(p => `<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="#00C9A7"/>`).join('')}${[0, 7, 14, 21, 29].map(i => { const x = pL + (i / (data.length - 1)) * (W - pL - pR); return `<text x="${x}" y="${H-12}" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="9.5" font-family="DM Mono, monospace">${labels[i].slice(5)}</text>` }).join('')}</svg>`
}

function renderSeverityChart(cards) {
  if (!cards.length) return '<div style="text-align:center;color:var(--text-3);padding:32px;font-size:12px">No cards yet</div>'
  const data = [
    { label: 'Critical', value: cards.filter(c => c.severity === 'crit').length, color: '#FF4D6D' },
    { label: 'Attention', value: cards.filter(c => c.severity === 'warn').length, color: '#F5A623' },
    { label: 'Stable', value: cards.filter(c => c.severity === 'good').length, color: '#2EE89A' },
    { label: 'Info', value: cards.filter(c => c.severity === 'info').length, color: '#4B8EFF' },
  ].filter(d => d.value > 0)
  const total = data.reduce((s, d) => s + d.value, 0) || 1
  const W = 700, barH = 28, gap = 14, pL = 110, pR = 40
  return `<svg viewBox="0 0 ${W} ${data.length * (barH + gap) + 8}" style="width:100%">${data.map((d, i) => { const y = i * (barH + gap); const barW = (d.value / total) * (W - pL - pR); const pct = Math.round((d.value / total) * 100); return `<text x="${pL - 12}" y="${y + barH/2 + 4}" text-anchor="end" fill="rgba(255,255,255,0.7)" font-size="12" font-family="Syne, sans-serif" font-weight="600">${d.label}</text><rect x="${pL}" y="${y}" width="${barW}" height="${barH}" fill="${d.color}" rx="4" opacity="0.85"/><text x="${pL + barW + 8}" y="${y + barH/2 + 4}" fill="rgba(255,255,255,0.85)" font-size="12" font-family="DM Mono, monospace" font-weight="600">${d.value} · ${pct}%</text>` }).join('')}</svg>`
}

function exportWorkspace() {
  const data = { workspace: STATE.role, user: STATE.user, exported: new Date().toISOString(), samples: STATE.samples, entries: STATE.entries, cards: STATE.cards, audit: STATE.audit }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a'); a.href = url; a.download = `jlight-${STATE.role}-${Date.now()}.json`; a.click()
  URL.revokeObjectURL(url)
  audit('Exported workspace', `${STATE.samples.length} samples · ${STATE.entries.length} entries · ${STATE.cards.length} cards`)
  toast('Exported', 'Workspace downloaded as JSON', 'good')
}
function clearWorkspace() {
  if (!confirm('Clear all data for this workspace? This cannot be undone.')) return
  STATE.samples = []; STATE.entries = []; STATE.cards = []; STATE.audit = []
  STORAGE.saveSamples(STATE.role, []); STORAGE.saveEntries(STATE.role, []); STORAGE.saveCards(STATE.role, []); STORAGE.saveAudit(STATE.role, [])
  toast('Cleared', 'Workspace data removed', 'warn'); goPage('dashboard')
}
function resetPIN() {
  if (!confirm('Reset your PIN? You will need to sign in and create a new one.')) return

}


function renderHandover() {
  if (STATE.role !== 'Laboratory') {
    $('page-handover').innerHTML = renderEmpty('Not available', 'Daily Handover is for Laboratory workspace only.', 'dashboard', '← Dashboard')
    return
  }

  // Compute window: last 24 hours (or all-time if less data)
  const now = Date.now()
  const windowMs = 24 * 60 * 60 * 1000
  const cutoff = now - windowMs

  const recentSamples = STATE.samples.filter(s => s.ts >= cutoff)
  const olderSamples = STATE.samples.filter(s => s.ts < cutoff)

  // Stats
  const total = recentSamples.length
  const reported = recentSamples.filter(s => s.stage === 'reported').length
  const flagged = recentSamples.filter(s => s.flags && Object.keys(s.flags).length > 0).length
  const stillProcessing = recentSamples.filter(s => s.stage !== 'reported').length

  // Cards in window
  const recentCards = STATE.cards.filter(c => c.ts >= cutoff)
  const critCards = recentCards.filter(c => c.severity === 'crit')
  const warnCards = recentCards.filter(c => c.severity === 'warn')
  const ackedCards = recentCards.filter(c => c.acknowledged)
  const openCritical = critCards.filter(c => !c.acknowledged)

  // Per-instrument summary
  const byInstrument = {}
  recentSamples.forEach(s => {
    if (!s.instrument) return
    if (!byInstrument[s.instrument]) byInstrument[s.instrument] = { total: 0, flagged: 0, tests: new Set() }
    byInstrument[s.instrument].total++
    if (s.flags && Object.keys(s.flags).length > 0) byInstrument[s.instrument].flagged++
    if (s.test) byInstrument[s.instrument].tests.add(s.test)
  })

  // Predictions for handover
  const predictions = computePredictions().slice(0, 5)
  const highUrgency = predictions.filter(p => p.urgency === 'high')

  // Outstanding items needing next-shift attention
  const outstanding = recentSamples.filter(s => s.stage !== 'reported' && (!s.flags || Object.keys(s.flags || {}).length === 0))
  const heldSamples = recentSamples.filter(s => s.flags && Object.keys(s.flags).length > 0 && s.stage !== 'reported')

  // Generate prose summary text
  const headline = (() => {
    if (critCards.length > 0 && openCritical.length > 0) return `${openCritical.length} critical issue${openCritical.length > 1 ? 's' : ''} unresolved · attention required`
    if (highUrgency.length > 0) return `${highUrgency.length} high-urgency prediction${highUrgency.length > 1 ? 's' : ''} pending action`
    if (flagged > 0) return `Routine shift · ${flagged} flagged sample${flagged > 1 ? 's' : ''} resolved`
    if (total === 0) return `No activity in last 24h`
    return `Routine shift · all systems within tolerance`
  })()

  const headlineClass = openCritical.length > 0 ? 'crit' : highUrgency.length > 0 ? 'warn' : flagged > 0 ? 'info' : 'good'

  $('page-handover').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Daily Handover Summary</div>
        <div class="page-sub">End-of-shift snapshot · last 24 hours · ready to hand over to next shift</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="exportHandover()">Export as text</button>
        <button class="btn" onclick="window.print()">Print</button>
      </div>
    </div>

    <div class="profile-card" style="border-color:rgba(0,201,167,0.18);background:linear-gradient(135deg, rgba(0,201,167,0.04), rgba(75,142,255,0.03))">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px">
        <span class="dc-pill ${headlineClass}"><span class="dot"></span>${esc(headlineClass.toUpperCase())}</span>
        <span style="font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace">${esc(new Date(now).toLocaleString(undefined, { hour12: false, year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }))}</span>
      </div>
      <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:700;letter-spacing:-0.4px;line-height:1.3">${esc(headline)}</div>
    </div>

    <div class="kpis">
      <div class="kpi"><div class="kpi-label">Samples Processed</div><div class="kpi-value">${total}</div><div class="kpi-trend">${reported} reported · ${stillProcessing} in pipeline</div></div>
      <div class="kpi ${critCards.length > 0 ? 'crit' : ''}"><div class="kpi-label">Critical Cards</div><div class="kpi-value">${critCards.length}</div><div class="kpi-trend">${openCritical.length} still open</div></div>
      <div class="kpi ${flagged > 0 ? 'warn' : 'good'}"><div class="kpi-label">Flagged Samples</div><div class="kpi-value">${flagged}</div><div class="kpi-trend">Engine-detected issues</div></div>
      <div class="kpi"><div class="kpi-label">Resolved This Shift</div><div class="kpi-value">${ackedCards.length}</div><div class="kpi-trend">Acknowledged cards</div></div>
    </div>

    ${openCritical.length > 0 ? `
      <div class="section">
        <div class="section-head">
          <div>
            <div class="section-title" style="color:var(--red)">⚠ Outstanding critical · hand over directly</div>
            <div class="section-sub">Next shift must address these immediately</div>
          </div>
        </div>
        <div class="dc-list">${openCritical.map(renderCardListItem).join('')}</div>
      </div>
    ` : ''}

    ${highUrgency.length > 0 ? `
      <div class="section">
        <div class="section-head">
          <div>
            <div class="section-title">◉ High-urgency predictions · take preventive action this shift or next</div>
            <div class="section-sub">JLIGHT forecasts these failures before they occur</div>

        ${highUrgency.map(renderPrediction).join('')}
      </div>
    ` : ''}

    ${heldSamples.length > 0 ? `
      <div class="section">

          </div>
        </div>
        <div style="display:grid;gap:10px">
          ${heldSamples.map(s => `
            <div class="dc" onclick="openSample('${s.id}')">
              <div class="dc-bar warn"></div>

                  <span class="dc-pill warn"><span class="dot"></span>${esc(s.stage)}</span>

                  ${s.flags && s.flags.suspectedFalsePositive ? `<span class="dc-pill warn">FP risk</span>` : ''}
                  ${s.flags && s.flags.suspectedFalseNegative ? `<span class="dc-pill warn">FN risk</span>` : ''}
                  ${s.flags && s.flags.deltaCheckFail ? `<span class="dc-pill warn">delta-check</span>` : ''}
                  ${s.flags && s.flags.entryMismatch ? `<span class="dc-pill crit">mismatch</span>` : ''}
                </div>
                <span class="dc-time">${timeAgo(s.ts)}</span>
              </div>
              <div class="dc-body">
                <div class="dc-title">${esc(s.sampleId)} · ${esc(s.patientId || '—')}</div>
                <div class="dc-desc">${esc(s.test || '')} · ${s.instrument ? esc(s.instrument) : ''}${s.value !== undefined ? ' · result ' + esc(s.value) : ''}</div>
              </div>
              <div class="dc-foot">

                <span class="dc-action-link">Review →</span>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    ` : ''}

    ${Object.keys(byInstrument).length > 0 ? `
      <div class="section">
        <div class="section-head">
          <div>

        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px">
          ${Object.entries(byInstrument).map(([inst, d]) => {

            const cls = flagPct > 20 ? 'crit' : flagPct > 5 ? 'warn' : 'good'
            return `

              </div>
            `
          }).join('')}
        </div>

    ` : ''}

    <div class="section">
      <div class="section-head">
        <div>
          <div class="section-title">Notes for next shift</div>
          <div class="section-sub">Auto-generated from JLIGHT analysis</div>

      <div class="dc-actions" style="background:var(--blue-bg);border-color:rgba(75,142,255,0.18)">
        <h4 style="color:var(--blue)">Hand-over points</h4>

          ${total === 0 ? '<li>No samples were processed in this period.</li>' : ''}

          ${openCritical.length > 0 ? `<li><strong>${openCritical.length} critical issue${openCritical.length > 1 ? 's' : ''} still open</strong> — review the cards above and follow recommended actions.</li>` : ''}

          })()}

function exportHandover() {
  const now = new Date()
  const cutoff = now.getTime() - 24*60*60*1000
  const recentSamples = STATE.samples.filter(s => s.ts >= cutoff)
  const recentCards = STATE.cards.filter(c => c.ts >= cutoff)
  const openCritical = recentCards.filter(c => c.severity === 'crit' && !c.acknowledged)
  const heldSamples = recentSamples.filter(s => s.flags && Object.keys(s.flags).length > 0 && s.stage !== 'reported')
  const predictions = computePredictions().filter(p => p.urgency === 'high')

  const lines = []
  lines.push('═══════════════════════════════════════')
  lines.push('  JLIGHT — DAILY HANDOVER SUMMARY')
  lines.push(`  Generated: ${now.toLocaleString(undefined, { hour12: false })}`)
  lines.push(`  Workspace: Laboratory · User: ${STATE.user}`)
  lines.push('═══════════════════════════════════════')
  lines.push('')
  lines.push('SHIFT METRICS (last 24h)')
  lines.push(`  Samples processed: ${recentSamples.length}`)
  lines.push(`  Reported: ${recentSamples.filter(s => s.stage === 'reported').length}`)
  lines.push(`  Flagged: ${recentSamples.filter(s => s.flags && Object.keys(s.flags).length > 0).length}`)
  lines.push(`  Critical cards: ${recentCards.filter(c => c.severity === 'crit').length}`)
  lines.push(`  Resolved: ${recentCards.filter(c => c.acknowledged).length}`)
  lines.push('')

  if (openCritical.length > 0) {
    lines.push(`OUTSTANDING CRITICAL (${openCritical.length})`)
    openCritical.forEach((c, i) => {
      lines.push(`  ${i+1}. ${c.title}`)
      lines.push(`     ${c.description}`)
    })
    lines.push('')
  }

  if (heldSamples.length > 0) {
    lines.push(`HELD SAMPLES (${heldSamples.length})`)
    heldSamples.forEach((s, i) => {
      const flags = Object.keys(s.flags || {}).join(', ')
      lines.push(`  ${i+1}. ${s.sampleId} · ${s.test} · ${s.instrument || ''} · flags: ${flags}`)
    })
    lines.push('')
  }

  if (predictions.length > 0) {
    lines.push(`HIGH-URGENCY PREDICTIONS (${predictions.length})`)
    predictions.forEach((p, i) => {
      lines.push(`  ${i+1}. ${p.title} · horizon: ${p.horizon} · confidence ${p.confidence}%`)
    })
    lines.push('')
  }

  lines.push('═══════════════════════════════════════')
  lines.push('  End of handover · sign-off & pass to next shift')
  lines.push('═══════════════════════════════════════')

  const text = lines.join('\n')
  const blob = new Blob([text], { type: 'text/plain' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url
  a.download = `jlight-handover-${now.toISOString().slice(0,10)}.txt`
  a.click()
  URL.revokeObjectURL(url)
  audit('Exported handover summary', `${recentSamples.length} samples · ${recentCards.length} cards`)
  toast('Exported', 'Handover summary downloaded', 'good')
}

      'Sodium':     { pct: 5,   abs: 8,   hours: 24 },
      'Potassium':  { pct: 30,  abs: 1.5, hours: 24 },

      'Hemoglobin': { pct: 15,  abs: 2,   hours: 24 },
      'WBC':        { pct: 50,  abs: 5,   hours: 24 },
      'Platelets':  { pct: 30,  abs: 100, hours: 24 },
      'Creatinine': { pct: 25,  abs: 30,  hours: 48 },
      'ALT':        { pct: 50,  abs: 100, hours: 48 },
      'CRP':        { pct: 100, abs: 50,  hours: 24 },

  }

  if (STATE.role === 'Hospital') {
    html += `
    <div class="section">
      <div class="section-head"><div><div class="section-title">TAT Thresholds (hours)</div><div class="section-sub">Per-priority turnaround time limits</div></div></div>
      <div class="form-card" style="max-width:none">
        <div class="form-grid">
          <div class="form-row"><label class="form-label">Stat priority (h)</label><input class="form-input" type="number" step="any" value="${t.tat.Stat}" id="th-tat-Stat"/></div>
          <div class="form-row"><label class="form-label">Urgent priority (h)</label><input class="form-input" type="number" step="any" value="${t.tat.Urgent}" id="th-tat-Urgent"/></div>
          <div class="form-row"><label class="form-label">Routine priority (h)</label><input class="form-input" type="number" step="any" value="${t.tat.Routine}" id="th-tat-Routine"/></div>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-head"><div><div class="section-title">HAI Cluster Detection</div><div class="section-sub">CDC/WHO probable outbreak = ≥2 same pathogen, same ward, 14 days</div></div></div>
      <div class="form-card" style="max-width:none">
        <div class="form-grid">
          <div class="form-row"><label class="form-label">Window (days)</label><input class="form-input" type="number" value="${t.haiCluster.sameWardWindowDays}" id="th-hai-days"/></div>
          <div class="form-row"><label class="form-label">Cluster size · warn</label><input class="form-input" type="number" value="${t.haiCluster.clusterSizeWarn}" id="th-hai-warn"/></div>
          <div class="form-row"><label class="form-label">Cluster size · critical</label><input class="form-input" type="number" value="${t.haiCluster.clusterSizeCrit}" id="th-hai-crit"/></div>
        </div>
      </div>
    </div>`
  }

  $('page-thresholds').innerHTML = html
}

function saveThresholds() {
  const t = STATE.thresholds || defaultThresholds()
  if (STATE.role === 'Laboratory') {
    const r13 = parseFloat($('th-1_3s').value); if (!isNaN(r13)) t.westgard.rule_1_3s = r13
    const r12 = parseFloat($('th-1_2s').value); if (!isNaN(r12)) t.westgard.rule_1_2s = r12
    Object.keys(t.deltaCheck).forEach(test => {
      const pct = parseFloat($(`th-dc-${test}-pct`).value)
      const abs = parseFloat($(`th-dc-${test}-abs`).value)
      const hrs = parseFloat($(`th-dc-${test}-hours`).value)
      if (!isNaN(pct)) t.deltaCheck[test].pct = pct
      if (!isNaN(abs)) t.deltaCheck[test].abs = abs
      if (!isNaN(hrs)) t.deltaCheck[test].hours = hrs
    })
  }
  if (STATE.role === 'Trial') {
    const w = parseFloat($('th-vw-warn').value); if (!isNaN(w)) t.visitWindow.warnDays = w
    const c = parseFloat($('th-vw-crit').value); if (!isNaN(c)) t.visitWindow.critDays = c
    const s = parseFloat($('th-sae-hours').value); if (!isNaN(s)) t.sae.hoursDeadline = s
  }
  if (STATE.role === 'Hospital') {
    ['Stat','Urgent','Routine'].forEach(p => { const v = parseFloat($(`th-tat-${p}`).value); if (!isNaN(v)) t.tat[p] = v })
    const d = parseFloat($('th-hai-days').value); if (!isNaN(d)) t.haiCluster.sameWardWindowDays = d
    const w = parseFloat($('th-hai-warn').value); if (!isNaN(w)) t.haiCluster.clusterSizeWarn = w
    const c = parseFloat($('th-hai-crit').value); if (!isNaN(c)) t.haiCluster.clusterSizeCrit = c
  }
  STATE.thresholds = t
  STORAGE.saveThresholds(STATE.role, t)
  audit('Thresholds updated', `Workspace thresholds saved`)
  toast('Saved', 'Thresholds will apply to all future analyses', 'good')
}

function resetThresholds() {
  if (!confirm('Reset all thresholds to default values?')) return
  STATE.thresholds = defaultThresholds()
  STORAGE.saveThresholds(STATE.role, STATE.thresholds)
  audit('Thresholds reset', 'Restored to defaults')
  toast('Reset', 'Default thresholds restored', 'good')
  renderThresholds()
}

// ═══════════════════════════════════════════════════════════
// CSV IMPORT — bulk historical data analysis
// ═══════════════════════════════════════════════════════════
function renderImport() {
  const examples = {
    Laboratory: 'sampleId,patientId,test,sampleType,priority,collectedAt,receivedAt,instrument,value,qcValue,lotNumber,clinicalContext\nSMPL-001,PT-100,Sodium,Serum,Routine,2026-04-28T08:00,2026-04-28T08:30,Roche cobas 8000,142,141,RGT-2026-04,Asymptomatic / screening\nSMPL-002,PT-101,Potassium,Serum,Stat,2026-04-28T09:00,2026-04-28T09:15,Roche cobas 8000,4.2,4.1,RGT-2026-04,Symptomatic — fever',
    Trial: 'eventCategory,participantId,site,eventDate,visitName,scheduledDate,attended,distance\nVisit,PTX-001,Site A,2026-04-28,Week 12,2026-04-25,Yes — attended,12\nVisit,PTX-002,Site A,2026-04-28,Week 12,2026-04-25,No — missed,45',
    Hospital: 'eventType,ward,patientId,eventTime,priority,tatHours,specimenTest\nSpecimen received,ICU,PT-200,2026-04-28T10:00,Stat,2.5,Blood culture\nResult delivered,ICU,PT-200,2026-04-28T11:30,Stat,1.5,Blood culture',
  }
  const example = examples[STATE.role] || ''

  $('page-import').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Bulk CSV Import</div>
        <div class="page-sub">Import historical data and run all intelligence engines retroactively</div>
      </div>
    </div>

    <div class="form-card" style="background:var(--purple-bg);border-color:rgba(167,139,250,0.18);max-width:none;margin-bottom:18px">
      <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--purple);margin-bottom:8px">How this works</div>
      <div style="font-size:13px;line-height:1.65">
        Paste a CSV with the columns below or upload a .csv file. JLIGHT will parse each row, run every applicable intelligence engine, and generate Decision Cards for issues found. <strong>This is the strongest possible demonstration of value:</strong> dump 6 months of historical QC, retention, or TAT data and immediately see what was missed.
      </div>
    </div>

    <div class="form-card" style="max-width:none">
      <div class="form-grid">
        <div class="form-row span-2">
          <label class="form-label">Required columns for ${esc(STATE.role)}</label>
          <pre style="background:var(--surface-3);padding:14px;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;overflow-x:auto;color:var(--text-2);line-height:1.5">${esc(example.split('\n')[0])}</pre>
          <div class="form-help">First row must be the header. Subsequent rows are data.</div>
        </div>
        <div class="form-row span-2">
          <label class="form-label">Upload CSV file</label>
          <input class="form-input" type="file" id="csv-file" accept=".csv,.tsv,.txt" onchange="handleCSVFile(event)"/>
        </div>
        <div class="form-row span-2">
          <label class="form-label">— or paste CSV here —</label>
          <textarea class="form-input" id="csv-textarea" style="min-height:180px;font-family:'DM Mono',monospace;font-size:12px" placeholder="${esc(example)}"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="importCSV()">Import & analyse</button>
        <button class="btn" onclick="goPage('dashboard')">Cancel</button>
      </div>
    </div>

    <div id="import-results" style="margin-top:18px"></div>
  `
}

function handleCSVFile(ev) {
  const file = ev.target.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = (e) => { $('csv-textarea').value = e.target.result }
  reader.readAsText(file)
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/)
  if (lines.length < 2) return []
  const headers = lines[0].split(',').map(h => h.trim())
  const rows = []
  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(',').map(v => v.trim())
    if (values.length === 1 && values[0] === '') continue
    const row = {}
    headers.forEach((h, idx) => { row[h] = values[idx] || '' })
    rows.push(row)
  }
  return rows
}

function importCSV() {
  const text = $('csv-textarea').value.trim()
  if (!text) { toast('Empty', 'Paste CSV or upload a file', 'crit'); return }
  let rows
  try { rows = parseCSV(text) } catch (e) { toast('Parse error', e.message, 'crit'); return }
  if (rows.length === 0) { toast('No data', 'CSV has no data rows', 'crit'); return }

  let imported = 0, cardsGenerated = 0, errors = []
  rows.forEach((row, idx) => {
    try {
      if (STATE.role === 'Laboratory') {
        const sample = {
          id: uid(), ts: Date.now() - (rows.length - idx) * 60000, role: STATE.role,
          sampleId: row.sampleId, patientId: row.patientId, test: row.test, sampleType: row.sampleType,
          priority: row.priority, collectedAt: row.collectedAt, receivedAt: row.receivedAt,
          instrument: row.instrument, value: parseFloat(row.value), qcValue: parseFloat(row.qcValue),
          lotNumber: row.lotNumber, clinicalContext: row.clinicalContext, resultType: 'Quantitative (numeric)',
          processedAt: Date.now() - (rows.length - idx) * 60000,
          stage: 'reported',
          history: [{ stage: 'imported', ts: Date.now(), operator: STATE.user, detail: 'Imported via CSV' }],
          errors: [], flags: {},
        }
        STATE.samples.push(sample)
        const issues = analyseLabSample(sample)
        issues.forEach(issue => {
          STATE.cards.push({
            id: uid(), ts: sample.ts, role: STATE.role, severity: issue.severity, source: issue.source,
            title: issue.title, description: issue.description, signals: issue.signals,
            insight: issue.insight, rootCause: issue.rootCause, actions: issue.actions,
            trace: `Import → ${sample.sampleId} → ${issue.engine}`,
            sampleId: sample.id, acknowledged: false,
          })
          cardsGenerated++
        })
      } else if (STATE.role === 'Trial') {
        const e = { id: uid(), ts: Date.now() - (rows.length - idx) * 60000, role: STATE.role, ...row }
        STATE.entries.push(e)
        const cards = analyseTrialEvent(e)
        cards.forEach(c => { STATE.cards.push(c); cardsGenerated++ })
      } else if (STATE.role === 'Hospital') {
        const e = { id: uid(), ts: Date.now() - (rows.length - idx) * 60000, role: STATE.role, ...row }
        STATE.entries.push(e)
        const cards = analyseHospitalEvent(e)
        cards.forEach(c => { STATE.cards.push(c); cardsGenerated++ })
      }
      imported++
    } catch (e) {
      errors.push(`Row ${idx + 2}: ${e.message}`)
    }
  })

  if (STATE.role === 'Laboratory') STORAGE.saveSamples(STATE.role, STATE.samples)
  else STORAGE.saveEntries(STATE.role, STATE.entries)
  STORAGE.saveCards(STATE.role, STATE.cards)
  audit('CSV import', `${imported} rows · ${cardsGenerated} cards`)

  $('import-results').innerHTML = `
    <div class="form-card" style="max-width:none;background:var(--green-bg);border-color:rgba(46,232,154,0.18)">
      <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:10px;color:var(--green)">Import complete</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:14px">
        <div><div style="font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace;letter-spacing:1px">IMPORTED</div><div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800">${imported}</div></div>
        <div><div style="font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace;letter-spacing:1px">CARDS GENERATED</div><div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:${cardsGenerated > 0 ? 'var(--amber)' : 'var(--green)'}">${cardsGenerated}</div></div>
        <div><div style="font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace;letter-spacing:1px">ERRORS</div><div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:${errors.length > 0 ? 'var(--red)' : 'var(--text-3)'}">${errors.length}</div></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="goPage('cards')">View ${cardsGenerated} cards →</button>
        <button class="btn" onclick="goPage('dashboard')">Back to dashboard</button>
      </div>
      ${errors.length > 0 ? `<div style="margin-top:14px;font-size:11.5px;color:var(--red);font-family:'DM Mono',monospace">${errors.slice(0, 5).map(e => esc(e)).join('<br>')}</div>` : ''}
    </div>
  `
  toast('Import complete', `${imported} rows · ${cardsGenerated} cards generated`, 'good')
}

function renderEmpty(title, desc, page, btnLabel) {
  return `<div class="empty"><div class="empty-icon">◌</div><div class="empty-title">${esc(title)}</div>${desc ? `<div class="empty-desc">${esc(desc)}</div>` : ''}${page && btnLabel ? `<button class="btn btn-primary" onclick="goPage('${page}')">${esc(btnLabel)}</button>` : ''}</div>`
}
