<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>JLIGHT — Health Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ink: #05080F; --ink-2: #0A0F1C;
  --surface: #0C1120; --surface-2: #111827; --surface-3: #161F30; --surface-4: #1A2438;
  --teal: #00C9A7; --teal-2: #00A387;
  --teal-glow: rgba(0,201,167,0.15); --teal-bg: rgba(0,201,167,0.06);
  --amber: #F5A623; --amber-glow: rgba(245,166,35,0.15); --amber-bg: rgba(245,166,35,0.06);
  --red: #FF4D6D; --red-glow: rgba(255,77,109,0.12); --red-bg: rgba(255,77,109,0.06);
  --green: #2EE89A; --green-glow: rgba(46,232,154,0.12); --green-bg: rgba(46,232,154,0.06);
  --blue: #4B8EFF; --blue-glow: rgba(75,142,255,0.12); --blue-bg: rgba(75,142,255,0.06);
  --purple: #A78BFA; --purple-bg: rgba(167,139,250,0.08);
  --border: rgba(255,255,255,0.07); --border-2: rgba(255,255,255,0.12); --border-strong: rgba(255,255,255,0.2);
  --text: rgba(255,255,255,0.92); --text-2: rgba(255,255,255,0.6); --text-3: rgba(255,255,255,0.35); --text-4: rgba(255,255,255,0.22);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-text-size-adjust: 100%; }
body { font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--text); line-height: 1.55; font-size: 14px; min-height: 100vh; -webkit-font-smoothing: antialiased; }
body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); opacity: 0.4; pointer-events: none; z-index: 9999; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; background: transparent; border: none; outline: none; }
a { color: var(--teal); text-decoration: none; }

.auth-screen { display: none; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: hidden; }
.auth-screen.active { display: flex; }
.auth-bg-grid { position: absolute; inset: 0; pointer-events: none; background-image: linear-gradient(rgba(0,201,167,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,201,167,0.04) 1px, transparent 1px); background-size: 80px 80px; mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent); }
.auth-glow { position: absolute; width: 700px; height: 700px; border-radius: 50%; pointer-events: none; background: radial-gradient(circle, rgba(0,201,167,0.08) 0%, transparent 65%); top: -200px; right: -200px; }
.auth-glow-2 { position: absolute; width: 500px; height: 500px; border-radius: 50%; pointer-events: none; background: radial-gradient(circle, rgba(75,142,255,0.06) 0%, transparent 65%); bottom: -100px; left: -100px; }
.auth-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 460px; position: relative; z-index: 1; box-shadow: 0 40px 100px rgba(0,0,0,0.4); }
.auth-brand { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 28px; }
.auth-mark { width: 42px; height: 42px; background: linear-gradient(135deg, var(--teal), var(--blue)); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.auth-mark svg { width: 22px; height: 22px; fill: none; stroke: white; stroke-width: 2.4; }
.auth-name { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.auth-tagline { text-align: center; font-size: 11px; color: var(--text-3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 28px; font-weight: 600; }
.auth-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; letter-spacing: -0.3px; }
.auth-sub { font-size: 13px; color: var(--text-2); text-align: center; margin-bottom: 28px; }
.role-grid { display: grid; gap: 12px; }
.role-btn { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border: 1px solid var(--border-2); border-radius: 12px; background: var(--surface-3); text-align: left; width: 100%; transition: all 0.2s ease; }
.role-btn:hover { border-color: var(--teal); background: var(--teal-bg); transform: translateX(2px); }
.role-icon { width: 44px; height: 44px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px; letter-spacing: 0.5px; }
.role-icon.lab { background: var(--blue-glow); color: var(--blue); border: 1px solid rgba(75,142,255,0.3); }
.role-icon.trial { background: var(--amber-glow); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
.role-icon.hospital { background: var(--red-glow); color: var(--red); border: 1px solid rgba(255,77,109,0.3); }
.role-info { flex: 1; min-width: 0; }
.role-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14.5px; margin-bottom: 3px; letter-spacing: -0.2px; }
.role-desc { font-size: 12px; color: var(--text-2); line-height: 1.45; }
.role-arrow { color: var(--text-3); font-size: 18px; }

.pin-display { display: flex; gap: 14px; justify-content: center; margin: 28px 0 24px; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border-2); transition: all 0.15s; }
.pin-dot.filled { background: var(--teal); border-color: var(--teal); box-shadow: 0 0 12px rgba(0,201,167,0.4); }
.pin-dot.error { background: var(--red); border-color: var(--red); animation: shake 0.4s; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
.pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 280px; margin: 0 auto; }
.pin-key { height: 56px; border-radius: 10px; background: var(--surface-3); border: 1px solid var(--border); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 20px; color: var(--text); transition: all 0.1s; }
.pin-key:hover { background: var(--surface-4); border-color: var(--border-2); }
.pin-key:active { transform: scale(0.95); background: var(--teal-bg); border-color: var(--teal); color: var(--teal); }
.pin-key.empty { visibility: hidden; }
.auth-status { text-align: center; font-size: 12.5px; margin-top: 16px; min-height: 20px; color: var(--text-2); }
.auth-status.error { color: var(--red); }
.auth-status.success { color: var(--green); }
.auth-back { margin-top: 22px; text-align: center; font-size: 12px; color: var(--text-3); }
.auth-back a { color: var(--text-2); cursor: pointer; }
.auth-back a:hover { color: var(--teal); }

.app-screen { display: none; min-height: 100vh; }
.app-screen.active { display: block; }
.layout { display: grid; grid-template-columns: 256px 1fr; min-height: 100vh; }

.sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sb-brand { padding: 20px 22px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 11px; }
.sb-brand-mark { width: 32px; height: 32px; background: linear-gradient(135deg, var(--teal), var(--blue)); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
.sb-brand-mark svg { width: 16px; height: 16px; fill: none; stroke: white; stroke-width: 2.4; }
.sb-brand-name { font-family: 'Syne', sans-serif; font-size: 19px; font-weight: 800; letter-spacing: -0.5px; }
.sb-role-banner { margin: 14px 14px 8px; padding: 10px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
.sb-role-banner.lab { background: var(--blue-glow); color: var(--blue); border: 1px solid rgba(75,142,255,0.25); }
.sb-role-banner.trial { background: var(--amber-glow); color: var(--amber); border: 1px solid rgba(245,166,35,0.25); }
.sb-role-banner.hospital { background: var(--red-glow); color: var(--red); border: 1px solid rgba(255,77,109,0.25); }
.sb-role-banner .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% {opacity:1} 50% {opacity:0.4} }
.sb-nav { flex: 1; padding: 8px 12px 12px; display: flex; flex-direction: column; gap: 1px; overflow-y: auto; }
.sb-section { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-4); padding: 16px 12px 8px; }
.sb-link { display: flex; align-items: center; gap: 11px; padding: 9px 12px; border-radius: 7px; font-size: 13px; font-weight: 500; color: var(--text-2); cursor: pointer; transition: all 0.12s; position: relative; }
.sb-link:hover { background: var(--surface-2); color: var(--text); }
.sb-link.active { background: var(--teal-bg); color: var(--teal); font-weight: 600; }
.sb-link.active::before { content: ''; position: absolute; left: -12px; top: 50%; transform: translateY(-50%); width: 3px; height: 16px; background: var(--teal); border-radius: 2px; }
.sb-link-icon { font-size: 14px; opacity: 0.85; width: 18px; text-align: center; }
.sb-link-badge { margin-left: auto; background: var(--red); color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; min-width: 18px; text-align: center; font-family: 'DM Mono', monospace; }
.sb-foot { padding: 14px 14px 18px; border-top: 1px solid var(--border); }
.sb-user { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface-2); border-radius: 10px; margin-bottom: 8px; }
.sb-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--teal), var(--blue)); color: white; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; flex-shrink: 0; }
.sb-userinfo { flex: 1; min-width: 0; }
.sb-username { font-size: 12.5px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-userrole { font-size: 10.5px; color: var(--text-3); font-family: 'DM Mono', monospace; }
.sb-signout { width: 100%; padding: 8px 12px; border-radius: 7px; font-size: 11.5px; font-weight: 500; color: var(--text-2); background: transparent; border: 1px solid var(--border); transition: all 0.1s; }
.sb-signout:hover { background: var(--red-glow); color: var(--red); border-color: rgba(255,77,109,0.3); }

.main { display: flex; flex-direction: column; min-width: 0; }
.topbar { height: 56px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; padding: 0 28px; gap: 16px; position: sticky; top: 0; z-index: 10; }
.tb-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: -0.2px; flex: 1; }
.tb-status { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--text-2); font-family: 'DM Mono', monospace; }
.tb-status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
.tb-btn { padding: 7px 14px; border-radius: 7px; font-size: 12.5px; font-weight: 500; background: var(--surface-3); border: 1px solid var(--border-2); transition: all 0.1s; }
.tb-btn:hover { background: var(--surface-4); border-color: var(--border-strong); }
.tb-btn.primary { background: var(--teal); color: var(--ink); border-color: var(--teal); font-weight: 600; }
.tb-btn.primary:hover { background: var(--teal-2); border-color: var(--teal-2); }

.content { flex: 1; padding: 28px; max-width: 1500px; width: 100%; margin: 0 auto; }
.page { display: none; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.page-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
.page-sub { font-size: 13.5px; color: var(--text-2); }

.btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 7px; font-size: 12.5px; font-weight: 500; background: var(--surface-3); color: var(--text); border: 1px solid var(--border-2); transition: all 0.1s; }
.btn:hover { background: var(--surface-4); border-color: var(--border-strong); }
.btn-primary { background: var(--teal); color: var(--ink); border-color: var(--teal); font-weight: 600; }
.btn-primary:hover { background: var(--teal-2); border-color: var(--teal-2); }
.btn-sm { padding: 6px 11px; font-size: 11.5px; }

.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 28px; }
.kpi { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; position: relative; overflow: hidden; }
.kpi::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--teal), var(--blue)); opacity: 0.4; }
.kpi.crit::after { background: var(--red); opacity: 0.7; }
.kpi.warn::after { background: var(--amber); opacity: 0.7; }
.kpi.good::after { background: var(--green); opacity: 0.7; }
.kpi-label { font-size: 10.5px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; }
.kpi-value { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -1.2px; line-height: 1; margin-bottom: 4px; }
.kpi.crit .kpi-value { color: var(--red); }
.kpi.warn .kpi-value { color: var(--amber); }
.kpi.good .kpi-value { color: var(--green); }
.kpi-trend { font-size: 11px; color: var(--text-3); font-family: 'DM Mono', monospace; }

.section { margin-bottom: 32px; }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
.section-sub { font-size: 11.5px; color: var(--text-3); margin-top: 2px; }

.dc-list { display: flex; flex-direction: column; gap: 12px; }
.dc { background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: all 0.2s ease; }
.dc:hover { border-color: var(--border-strong); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }
.dc-bar { height: 3px; background: linear-gradient(90deg, var(--amber), #FF6B35); }
.dc-bar.crit { background: linear-gradient(90deg, var(--red), #FF8C69); }
.dc-bar.warn { background: linear-gradient(90deg, var(--amber), #F7971E); }
.dc-bar.good { background: linear-gradient(90deg, var(--teal), var(--green)); }
.dc-bar.info { background: linear-gradient(90deg, var(--blue), #6BA3FF); }
.dc-head { padding: 16px 20px 12px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.dc-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.dc-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; border: 1px solid; letter-spacing: 1px; text-transform: uppercase; }
.dc-pill.crit { background: var(--red-glow); border-color: rgba(255,77,109,0.3); color: var(--red); }
.dc-pill.warn { background: var(--amber-glow); border-color: rgba(245,166,35,0.3); color: var(--amber); }
.dc-pill.good { background: var(--green-glow); border-color: rgba(46,232,154,0.3); color: var(--green); }
.dc-pill.info { background: var(--blue-glow); border-color: rgba(75,142,255,0.3); color: var(--blue); }
.dc-pill .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
.dc-source { font-size: 10.5px; color: var(--text-3); font-family: 'DM Mono', monospace; }
.dc-time { font-size: 10.5px; color: var(--text-4); font-family: 'DM Mono', monospace; }
.dc-body { padding: 0 20px 16px; }
.dc-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: -0.2px; margin-bottom: 6px; }
.dc-desc { font-size: 13px; color: var(--text-2); line-height: 1.55; }
.dc-foot { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.dc-trace { font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--text-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
.dc-action-link { font-size: 11.5px; font-weight: 600; color: var(--teal); display: inline-flex; align-items: center; gap: 5px; }

.dc-detail { background: var(--surface-2); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.dc-detail-bar { height: 3px; }
.dc-detail-bar.crit { background: linear-gradient(90deg, var(--red), #FF8C69); }
.dc-detail-bar.warn { background: linear-gradient(90deg, var(--amber), #F7971E); }
.dc-detail-bar.good { background: linear-gradient(90deg, var(--teal), var(--green)); }
.dc-detail-bar.info { background: linear-gradient(90deg, var(--blue), #6BA3FF); }
.dc-detail-head { padding: 22px 28px 18px; display: flex; align-items: flex-start; justify-content: space-between; border-bottom: 1px solid var(--border); }
.dc-detail-body { padding: 24px 28px; }
.dc-detail-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -0.4px; line-height: 1.2; margin-bottom: 8px; }
.dc-detail-sub { font-size: 13.5px; color: var(--text-2); margin-bottom: 22px; }
.dc-field { margin-bottom: 20px; }
.dc-field-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
.dc-signals { display: flex; flex-wrap: wrap; gap: 7px; }
.dc-chip { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; padding: 5px 11px; border-radius: 20px; border: 1px solid; background: var(--surface-3); }
.dc-chip.red { background: var(--red-glow); border-color: rgba(255,77,109,0.25); color: #FF8C9E; }
.dc-chip.amber { background: var(--amber-glow); border-color: rgba(245,166,35,0.25); color: #F7C97A; }
.dc-chip.blue { background: var(--blue-glow); border-color: rgba(75,142,255,0.25); color: #89AEFF; }
.dc-chip.green { background: var(--green-glow); border-color: rgba(46,232,154,0.25); color: #7FF0BC; }

.dc-insight { background: var(--teal-bg); border-left: 2px solid var(--teal); padding: 14px 18px; border-radius: 0 10px 10px 0; margin-bottom: 22px; }
.dc-insight p { font-size: 13px; color: var(--text); line-height: 1.65; }
.dc-rootcause { background: var(--purple-bg); border: 1px solid rgba(167,139,250,0.18); border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }
.dc-rootcause h4 { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--purple); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
.dc-rc-item { display: flex; gap: 10px; padding: 10px 12px; background: rgba(255,255,255,0.02); border-radius: 8px; font-size: 12.5px; line-height: 1.55; margin-bottom: 6px; }
.dc-rc-stage { color: var(--purple); font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; min-width: 100px; padding-top: 2px; }
.dc-rc-text { color: var(--text); flex: 1; }
.dc-actions { background: var(--green-bg); border: 1px solid rgba(46,232,154,0.18); border-radius: 12px; padding: 16px 20px; }
.dc-actions h4 { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--green); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
.dc-actions ul { list-style: none; padding: 0; }
.dc-actions li { font-size: 13px; color: var(--text); line-height: 1.6; padding-left: 22px; position: relative; margin-bottom: 7px; }
.dc-actions li::before { content: '→'; position: absolute; left: 0; color: var(--green); font-weight: 700; }
.dc-detail-foot { padding: 16px 28px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.dc-detail-actions { display: flex; gap: 8px; }

.profile-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; margin-bottom: 16px; }
.profile-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
.profile-id { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: -0.2px; }
.profile-meta { font-size: 11.5px; color: var(--text-3); font-family: 'DM Mono', monospace; margin-top: 3px; }
.lifecycle { display: flex; align-items: center; gap: 0; flex-wrap: wrap; row-gap: 10px; padding: 8px 0; }

async function sha256Hex(text) {
  const data = new TextEncoder().encode(text)
  const buf = await crypto.subtle.digest('SHA-256', data)
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('')
}

// Compute hash of an audit entry: hash = sha256(prevHash + ts + action + detail + user)
async function computeAuditHash(prevHash, entry) {
  const payload = (prevHash || '0'.repeat(64)) + entry.ts + (entry.action || '') + (entry.detail || '') + (entry.user || '')
  return await sha256Hex(payload)
}

const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
const uid = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5)

const timeAgo = (ts) => {
  const s = Math.floor((Date.now() - ts) / 1000)
  if (s < 60) return `${s}s ago`
  if (s < 3600) return `${Math.floor(s/60)}m ago`
  if (s < 86400) return `${Math.floor(s/3600)}h ago`
  return `${Math.floor(s/86400)}d ago`
}

// Backend sync — fire and forget; failures fall back to localStorage cache
async function syncToBackend(table, items) {
  const sb = getSupabase()
  if (!sb || !MODE.isOnline) return
  try {
    const tableName = `jl_${table}`
    const session = await sb.auth.getSession()
    if (!session.data.session) return
    const userId = session.data.session.user.id
    const enriched = items.map(item => ({
      jl_id: item.id, role: STATE.role, user_id: userId,
      organisation: MODE.organisationName, payload: item, ts: new Date(item.ts || Date.now()).toISOString(),
    }))
    await sb.from(tableName).upsert(enriched, { onConflict: 'jl_id' })
  } catch (e) {
    console.warn('Sync failed (saved locally):', e.message)
  }
}

async function loadFromBackend() {
  const sb = getSupabase()
  if (!sb || !MODE.isOnline) return null
  try {
    const session = await sb.auth.getSession()
    if (!session.data.session) return null
    const userId = session.data.session.user.id
    const tables = ['samples', 'entries', 'cards', 'audit']
    const results = {}
    for (const t of tables) {
      const { data, error } = await sb.from(`jl_${t}`).select('payload').eq('user_id', userId).eq('role', STATE.role).order('ts', { ascending: false }).limit(500)
      if (!error && data) results[t] = data.map(r => r.payload)
    }
    return results
  } catch (e) {
    console.warn('Load from backend failed:', e.message)
    return null
  }
}

async function hashPin(pin, role) {
  const data = new TextEncoder().encode(`JLIGHT-v7-${role}-${pin}-2026`)
  const buf = await crypto.subtle.digest('SHA-256', data)
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('')
}

function toast(title, msg, type) {
  const host = $('toast-host')
  const t = document.createElement('div')
  t.className = `toast ${type || ''}`
  t.innerHTML = `<div class="toast-title">${esc(title)}</div>${msg ? `<div class="toast-msg">${esc(msg)}</div>` : ''}`
  host.appendChild(t)
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(120%)'; setTimeout(() => t.remove(), 300) }, 3500)
}

async function audit(action, detail) {
  if (!STATE.role) return
  const entry = { id: uid(), ts: Date.now(), time: nowStr(), action, detail: detail || '', user: STATE.user || 'System', role: STATE.role }
  // Cryptographic chain: each entry hashes the previous entry's hash + its own contents
  const prev = STATE.audit[STATE.audit.length - 1]
  const prevHash = prev ? prev.hash : null
  try { entry.hash = await computeAuditHash(prevHash, entry) } catch { entry.hash = 'pending' }
  entry.prevHash = prevHash
  STATE.audit.push(entry)
  STORAGE.saveAudit(STATE.role, STATE.audit)
}

// Verify entire audit chain integrity. Returns { valid: bool, brokenAt: index | null, count: total }
async function verifyAuditChain() {
  let prevHash = null
  for (let i = 0; i < STATE.audit.length; i++) {
    const e = STATE.audit[i]
    const expected = await computeAuditHash(prevHash, e)
    if (e.hash !== expected) {
      return { valid: false, brokenAt: i, count: STATE.audit.length, entry: e }
    }
    prevHash = e.hash
  }
  return { valid: true, brokenAt: null, count: STATE.audit.length }
}

async function doSignIn() {
  const email = $('signin-email').value.trim()
  const password = $('signin-password').value
  if (!email || !password) {
    $('signin-status').textContent = 'Email and password required'
    $('signin-status').className = 'auth-status error'
    return
  }
  if (password.length < 8) {
    $('signin-status').textContent = 'Password must be at least 8 characters'
    $('signin-status').className = 'auth-status error'
    return
  }

  const sb = getSupabase()
  if (!sb) {
    $('signin-status').textContent = 'Backend unavailable · use offline mode'
    $('signin-status').className = 'auth-status error'
    return
  }

  $('signin-btn').disabled = true
  $('signin-btn').textContent = MODE.isSignupMode ? 'Creating...' : 'Signing in...'
  $('signin-status').textContent = ''

  try {
    if (MODE.isSignupMode) {
      const orgName = $('signin-org').value.trim()
      const role = $('signin-role').value
      if (!orgName) throw new Error('Organisation name required')

      const { data, error } = await sb.auth.signUp({ email, password, options: { data: { org_name: orgName, role } } })
      if (error) throw error
      if (!data.user) throw new Error('Sign-up incomplete · check email for verification')

      // Create organisation record
      const { data: org, error: orgErr } = await sb.from('jl_organisations').insert({
        name: orgName, role: role, owner_email: email, created_at: new Date().toISOString()
      }).select().single()
      if (orgErr && orgErr.code !== '42P01') throw orgErr  // 42P01 = table doesn't exist yet

      MODE.isOnline = true
      MODE.organisationId = org ? org.id : null
      MODE.organisationName = orgName
      STATE.role = role
      STATE.user = email
      $('signin-status').textContent = 'Workspace created · check email if verification required'
      $('signin-status').className = 'auth-status success'
      setTimeout(() => enterApp(), 1200)
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password })
      if (error) throw error
      if (!data.session) throw new Error('Sign-in failed · no session returned')

      MODE.isOnline = true
      const meta = data.user.user_metadata || {}
      STATE.user = email
      STATE.role = meta.role || 'Laboratory'
      MODE.organisationName = meta.org_name || 'Workspace'
      enterApp()
    }
  } catch (err) {
    $('signin-status').textContent = err.message || 'Authentication failed'
    $('signin-status').className = 'auth-status error'
  } finally {
    $('signin-btn').disabled = false
    $('signin-btn').textContent = MODE.isSignupMode ? 'Create workspace' : 'Sign in'
  }
}

function toggleOfflineMode() {
  // Show role picker for offline-only mode (preserves v7 behaviour)
  if (!confirm('Switch to offline mode? Data will only be stored on this device and not synced.')) return
  MODE.isOnline = false
  // Use simple role picker via prompt for now
  const role = prompt('Choose workspace: type Laboratory, Trial, or Hospital', 'Laboratory')
  if (!role || !ROLES[role]) return
  STATE.role = role
  STATE.pinBuf = ''; STATE.setupBuf = ''; STATE.setupFirst = ''; STATE.failedAttempts = 0
  STATE.setupMode = !STORAGE.getPinHash(role)
  const cfg = ROLES[role]
  $('pin-workspace').textContent = `${cfg.label} workspace · offline`
  $('pin-title').textContent = STATE.setupMode ? 'Create your PIN' : 'Enter your PIN'
  $('pin-sub').textContent = STATE.setupMode ? 'Choose a 4-digit code · stays on your device' : 'Type your 4-digit code'
  $('pin-status').textContent = ''; $('pin-status').className = 'auth-status'
  updateDots(); showScreen('pin')
}

// Legacy chooseRole kept for offline mode compatibility (no-op now)
function chooseRole(role) { toggleOfflineMode() }
function goBackToRoles() { showScreen('signin') }
function pinPress(d) {
  const buf = STATE.setupMode ? 'setupBuf' : 'pinBuf'
  if (STATE[buf].length >= 4) return
  STATE[buf] += d
  updateDots()
  if (STATE[buf].length === 4) setTimeout(() => STATE.setupMode ? handleSetup() : handleLogin(), 150)
}
function pinBack() {
  const buf = STATE.setupMode ? 'setupBuf' : 'pinBuf'
  STATE[buf] = STATE[buf].slice(0, -1)
  updateDots()
}
function updateDots() {
  const buf = STATE.setupMode ? STATE.setupBuf : STATE.pinBuf
  $$('.pin-dot').forEach((d, i) => { d.classList.toggle('filled', i < buf.length); d.classList.remove('error') })
}
async function handleLogin() {
  const expected = STORAGE.getPinHash(STATE.role)
  const actual = await hashPin(STATE.pinBuf, STATE.role)
  if (actual === expected) { STATE.failedAttempts = 0; enterApp() }
  else {
    STATE.failedAttempts++
    $$('.pin-dot').forEach(d => d.classList.add('error'))
    const remaining = 5 - STATE.failedAttempts
    if (remaining <= 0) { $('pin-status').textContent = 'Too many failed attempts'; $('pin-status').className = 'auth-status error'; return }
    $('pin-status').textContent = `Incorrect PIN · ${remaining} attempt${remaining === 1 ? '' : 's'} remaining`
    $('pin-status').className = 'auth-status error'
    setTimeout(() => { STATE.pinBuf = ''; updateDots(); $('pin-status').textContent = '' }, 900)
  }
}
async function handleSetup() {
  if (!STATE.setupFirst) {
    STATE.setupFirst = STATE.setupBuf; STATE.setupBuf = ''; updateDots()
    $('pin-title').textContent = 'Confirm your PIN'; $('pin-sub').textContent = 'Enter the same 4-digit code again'
    return
  }
  if (STATE.setupBuf === STATE.setupFirst) {
    const hash = await hashPin(STATE.setupBuf, STATE.role)
    STORAGE.setPinHash(STATE.role, hash)
    STATE.setupMode = false
    enterApp()
  } else {
    $$('.pin-dot').forEach(d => d.classList.add('error'))
    $('pin-status').textContent = 'PINs do not match · start over'
    $('pin-status').className = 'auth-status error'
    setTimeout(() => {
      STATE.setupBuf = ''; STATE.setupFirst = ''; updateDots()
      $('pin-title').textContent = 'Create your PIN'; $('pin-sub').textContent = 'Choose a 4-digit code'
      $('pin-status').textContent = ''
    }, 1100)
  }
}
async function signOut() {
  await audit('Sign out', `${STATE.role} session ended`)
  if (MODE.isOnline) {
    const sb = getSupabase()
    if (sb) { try { await sb.auth.signOut() } catch (e) {} }
  }
  MODE.isOnline = false; MODE.organisationId = null; MODE.organisationName = null
  STATE.role = null; STATE.user = null
  STATE.pinBuf = ''; STATE.samples = []; STATE.entries = []; STATE.cards = []; STATE.audit = []
  STATE.currentCardId = null; STATE.currentSampleId = null; STATE.currentPage = 'dashboard'
  showScreen('signin')
  $('signin-email').value = ''; $('signin-password').value = ''
}

async function enterApp() {
  const cfg = ROLES[STATE.role]
  if (!MODE.isOnline) STATE.user = cfg.user
  STATE.samples = STORAGE.loadSamples(STATE.role)
  STATE.entries = STORAGE.loadEntries(STATE.role)
  STATE.cards = STORAGE.loadCards(STATE.role)
  STATE.audit = STORAGE.loadAudit(STATE.role)
  STATE.thresholds = STORAGE.loadThresholds(STATE.role) || defaultThresholds()
  // If online, hydrate from backend
  if (MODE.isOnline) {
    const remote = await loadFromBackend()
    if (remote) {
      if (remote.samples && remote.samples.length) STATE.samples = remote.samples
      if (remote.entries && remote.entries.length) STATE.entries = remote.entries
      if (remote.cards && remote.cards.length) STATE.cards = remote.cards
      if (remote.audit && remote.audit.length) STATE.audit = remote.audit
    }
  }
  $('sb-username').textContent = cfg.user
  $('sb-userrole').textContent = cfg.label
  $('sb-avatar').textContent = cfg.short
  $('sb-role-banner').className = `sb-role-banner ${cfg.iconClass}`
  $('sb-role-text').textContent = cfg.label
  buildNav()
  showScreen('app')
  goPage('dashboard')
  audit('Sign in', `${cfg.label} workspace accessed`)
  toast(`Welcome to ${cfg.label}`, cfg.intro, 'good')
}

function buildNav() {
  const cfg = ROLES[STATE.role]
  const nav = $('sb-nav')
  const openCards = STATE.cards.filter(c => !c.acknowledged).length
  nav.innerHTML = `
    <div class="sb-section">${esc(cfg.label)}</div>
    ${cfg.nav.map(item => {
      const isActive = (STATE.currentPage === item.key || (STATE.currentPage === 'sample-detail' && item.key === 'samples') || (STATE.currentPage === 'detail' && item.key === 'cards')) ? 'active' : ''
      const badge = item.key === 'cards' && openCards > 0 ? `<span class="sb-link-badge">${openCards}</span>` : ''
      return `<div class="sb-link ${isActive}" onclick="goPage('${item.key}')"><span class="sb-link-icon">${item.icon}</span><span>${esc(item.label)}</span>${badge}</div>`
    }).join('')}
  `
}

function goPage(page) {
  STATE.currentPage = page
  $$('.page').forEach(p => p.classList.remove('active'))
  const target = $(`page-${page}`)
  if (target) target.classList.add('active')
  const titles = {
    dashboard: 'Intelligence Dashboard', cards: 'Decision Cards', detail: 'Card Detail',
    register: STATE.role === 'Laboratory' ? 'Register Sample' : (STATE.role === 'Trial' ? 'Log Visit' : 'Log Event'),
    process: 'Record Result', samples: 'Sample Profiles', 'sample-detail': 'Sample Profile',
    predictive: 'Predictive Failure Engine', handover: 'Daily Handover Summary', analytics: 'Analytics', connectors: 'Data Sources', import: 'CSV Import', thresholds: 'Configurable Thresholds',
    audit: 'Audit Trail', settings: 'Settings',
  }
  $('tb-title').textContent = titles[page] || page
  buildNav()
  switch (page) {
    case 'dashboard': renderDashboard(); break
    case 'cards':     renderCards(); break
    case 'detail':    renderDetail(); break
    case 'register':  renderRegister(); break
    case 'process':   renderProcess(); break
    case 'samples':   renderSamples(); break
    case 'sample-detail': renderSampleDetail(); break
    case 'predictive': renderPredictive(); break
    case 'handover': renderHandover(); break
    case 'analytics': renderAnalytics(); break
    case 'connectors': renderConnectors(); break
    case 'import':    renderImport(); break
    case 'thresholds': renderThresholds(); break
    case 'audit':     renderAudit(); break
    case 'settings':  renderSettings(); break
  }
}

document.addEventListener('keydown', (e) => {
  if ($('screen-pin').classList.contains('active')) {
    if (/^[0-9]$/.test(e.key)) { e.preventDefault(); pinPress(e.key) }
    if (e.key === 'Backspace') { e.preventDefault(); pinBack() }
    if (e.key === 'Escape') { e.preventDefault(); goBackToRoles() }
  }
})

function renderDashboard() {
  const cfg = ROLES[STATE.role]
  const cards = STATE.cards
  const open = cards.filter(c => !c.acknowledged).length
  const critical = cards.filter(c => c.severity === 'crit' && !c.acknowledged).length
  let kpiHTML = ''

  if (STATE.role === 'Laboratory') {
    const samples = STATE.samples
    const completed = samples.filter(s => s.stage === 'reported')
    const errors = samples.filter(s => s.errors && s.errors.length > 0)
    const contam = samples.filter(s => s.flags && s.flags.contamination)
    const fp = samples.filter(s => s.flags && s.flags.suspectedFalsePositive)
    const fn = samples.filter(s => s.flags && s.flags.suspectedFalseNegative)
    const errorRate = samples.length ? Math.round((errors.length / samples.length) * 100) : 0
    const contamRate = samples.length ? ((contam.length / samples.length) * 100).toFixed(1) : '0.0'
    const cls = errorRate > 5 ? 'crit' : errorRate > 2 ? 'warn' : 'good'
    kpiHTML = `
      <div class="kpi ${cls}"><div class="kpi-label">Sample Error Rate</div><div class="kpi-value">${errorRate}%</div><div class="kpi-trend">${errors.length}/${samples.length} samples flagged</div></div>
      <div class="kpi ${critical > 0 ? 'crit' : 'good'}"><div class="kpi-label">Open Decisions</div><div class="kpi-value">${open}</div><div class="kpi-trend">${critical} critical · ${cards.filter(c=>c.severity==='warn'&&!c.acknowledged).length} warning</div></div>
      <div class="kpi ${parseFloat(contamRate) > 1 ? 'warn' : ''}"><div class="kpi-label">Contamination Rate</div><div class="kpi-value">${contamRate}%</div><div class="kpi-trend">${contam.length} samples flagged</div></div>
      <div class="kpi ${(fp.length + fn.length) > 0 ? 'warn' : ''}"><div class="kpi-label">FP / FN Detected</div><div class="kpi-value">${fp.length}/${fn.length}</div><div class="kpi-trend">False pos / false neg</div></div>

function renderCards() {

function filterCards(el, filter) {
  $$('.tab').forEach(t => t.classList.remove('active'))

  const cards = STATE.cards.sort((a, b) => b.ts - a.ts)
  const filtered = filter === 'all' ? cards : cards.filter(c => c.severity === filter)
  $('cards-container').innerHTML = filtered.length ? `<div class="dc-list">${filtered.map(renderCardListItem).join('')}</div>` : renderEmpty('No cards match this filter')
}

function acknowledgeCard(id) {
  const c = STATE.cards.find(x => x.id === id); if (!c) return
  c.acknowledged = true; c.acknowledgedBy = STATE.user; c.acknowledgedAt = Date.now()
  STORAGE.saveCards(STATE.role, STATE.cards)
  audit('Card acknowledged', c.title); toast('Card acknowledged', c.title, 'good')
  renderDetail()
}
function reopenCard(id) {
  const c = STATE.cards.find(x => x.id === id); if (!c) return
  c.acknowledged = false; delete c.acknowledgedBy; delete c.acknowledgedAt
  STORAGE.saveCards(STATE.role, STATE.cards)
  audit('Card reopened', c.title); renderDetail()
}
function clearResolvedCards() {
  const before = STATE.cards.length
  STATE.cards = STATE.cards.filter(c => !c.acknowledged)
  STORAGE.saveCards(STATE.role, STATE.cards)
  toast('Cleared', `${before - STATE.cards.length} resolved cards removed`, 'good')
  renderCards()
}

function submitSampleRegistration() {
  const get = (k) => $(`rf-${k}`).value.trim()
  const sampleId = get('sampleId')
  if (!sampleId) { toast('Missing field', 'Sample ID is required', 'crit'); return }

  const errors = []
  if (STATE.samples.some(s => s.sampleId === sampleId)) {
    errors.push({ stage: 'Registration', issue: 'Duplicate Sample ID', detail: `Sample ID "${sampleId}" already exists. Registering the same ID twice causes result confusion.` })
  }
  const collectedAt = get('collectedAt'), receivedAt = get('receivedAt')
  if (collectedAt && receivedAt && new Date(collectedAt) > new Date(receivedAt)) {
    errors.push({ stage: 'Registration', issue: 'Time mismatch', detail: 'Collection time is after receipt time — logically impossible, indicates data entry error.' })
  }
  if (collectedAt && receivedAt) {
    const transitHours = (new Date(receivedAt) - new Date(collectedAt)) / 3600000
    if (transitHours > 24) {
      errors.push({ stage: 'Registration', issue: 'Excessive transit time', detail: `Sample took ${transitHours.toFixed(1)} hours between collection and receipt. Most analytes degrade beyond 6-8 hours unrefrigerated.` })
    }
  }

  const sample = {
    id: uid(), ts: Date.now(), role: STATE.role,
    sampleId, patientId: get('patientId'), sampleType: get('sampleType'), test: get('test'),
    collectedAt, receivedAt, priority: get('priority'),
    operatorRegistration: get('operator'), notes: get('notes'),
    stage: 'registered',
    history: [{ stage: 'registered', ts: Date.now(), operator: get('operator') || STATE.user, detail: 'Sample registered into JLIGHT' }],
    errors, flags: {},
  }
  STATE.samples.push(sample)
  STORAGE.saveSamples(STATE.role, STATE.samples)
  audit('Sample registered', `${sampleId} · ${get('test')}`)

  errors.forEach(e => { STATE.cards.push(generateRegistrationErrorCard(sample, e)) })
  if (errors.length > 0) STORAGE.saveCards(STATE.role, STATE.cards)

  if (errors.length > 0) toast('Registration issues', `${errors.length} error${errors.length > 1 ? 's' : ''} flagged`, 'warn')
  else toast('Sample registered', `${sampleId} → next: record QC entry`, 'good')

  STATE.currentSampleId = sample.id
  goPage('process')
}

          ${s.history.map(h => `<div style="display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12.5px"><span style="font-family:'DM Mono',monospace;font-size:10.5px;color:var(--text-3);min-width:120px">${esc(new Date(h.ts).toLocaleString(undefined, { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' }))}</span><span style="color:var(--teal);font-weight:600;text-transform:uppercase;font-size:10.5px;letter-spacing:1px;min-width:90px">${esc(h.stage)}</span><span style="flex:1;color:var(--text)">${esc(h.detail)}</span><span style="font-size:10.5px;color:var(--text-3);font-family:'DM Mono',monospace">${esc(h.operator)}</span></div>`).join('')}
        </div>
      </div>
      <div class="detail-side">
        <div class="detail-info">
          <h4>Linked Decision Cards</h4>
          ${linkedCards.length === 0 ? '<div style="font-size:12px;color:var(--text-3)">No issues detected</div>' : linkedCards.map(c => `<div onclick="openCard('${c.id}')" style="cursor:pointer;padding:10px 0;border-bottom:1px solid var(--border)"><div style="font-size:12px;font-weight:600;color:var(--${c.severity === 'crit' ? 'red' : c.severity === 'warn' ? 'amber' : 'text'});margin-bottom:3px">${esc(c.title)}</div><div style="font-size:11px;color:var(--text-3)">${timeAgo(c.ts)} · ${esc(c.source)}</div></div>`).join('')}
        </div>
        ${s.errors && s.errors.length > 0 ? `<div class="detail-info"><h4>Registration Errors</h4>${s.errors.map(e => `<div style="padding:10px 0;border-bottom:1px solid var(--border);font-size:12px"><div style="color:var(--red);font-weight:600;margin-bottom:3px">${esc(e.issue)}</div><div style="color:var(--text-2);font-size:11.5px;line-height:1.5">${esc(e.detail)}</div></div>`).join('')}</div>` : ''}
      </div>
    </div>
  `
}

// LABORATORY INTELLIGENCE ENGINES
// ═══════════════════════════════════════════════════════════
function submitResult(sampleId) {
  const s = STATE.samples.find(x => x.id === sampleId)
  if (!s) { toast('Error', 'Sample not found', 'crit'); return }
  const get = (k) => $(`pf-${k}`).value.trim()
  const value = parseFloat(get('value')), qcValue = parseFloat(get('qcValue'))
  const instrument = get('instrument'), lotNumber = get('lotNumber')
  const resultType = get('resultType'), operator = get('operator'), context = get('context')
  if (!instrument) { toast('Missing field', 'Instrument is required', 'crit'); return }

  s.instrument = instrument; s.value = value; s.qcValue = qcValue; s.lotNumber = lotNumber
  s.resultType = resultType; s.operatorProcessing = operator; s.clinicalContext = context
  s.processedAt = Date.now(); s.stage = 'processed'
  s.history.push({ stage: 'entered', ts: Date.now(), operator: operator || STATE.user, detail: `QC value entered: ${qcValue || 'n/a'}` })
  s.history.push({ stage: 'processed', ts: Date.now(), operator: operator || STATE.user, detail: `Result: ${value} on ${instrument}` })

  const issues = analyseLabSample(s)
  const hasCrit = issues.some(i => i.severity === 'crit')
  if (!hasCrit) {
    s.stage = 'reported'
    s.history.push({ stage: 'reported', ts: Date.now(), operator: operator || STATE.user, detail: 'Sample reported — no critical errors' })
  } else {
    s.history.push({ stage: 'flagged', ts: Date.now(), operator: 'JLIGHT Engine', detail: `Held — ${issues.filter(i => i.severity === 'crit').length} critical error(s)` })
  }

  STORAGE.saveSamples(STATE.role, STATE.samples)
  audit('Result recorded', `${s.sampleId} · ${value} ${instrument}`)

  issues.forEach(issue => {
    STATE.cards.push({
      id: uid(), ts: Date.now(), role: STATE.role, severity: issue.severity, source: issue.source,
      title: issue.title, description: issue.description, signals: issue.signals,
      insight: issue.insight, rootCause: issue.rootCause, actions: issue.actions,
      trace: `Sample[${s.sampleId}] → ${issue.engine} → Card`,
      sampleId: s.id, acknowledged: false,
    })
  })
  if (issues.length > 0) {
    STORAGE.saveCards(STATE.role, STATE.cards)
    audit('Decision cards generated', `${issues.length} cards for ${s.sampleId}`)
    toast(`${issues.length} issue${issues.length > 1 ? 's' : ''} detected`, issues[0].title, issues[0].severity)
  } else {
    toast('Result accepted', 'Sample reported · no errors detected', 'good')
  }

  STATE.currentSampleId = s.id
  goPage('sample-detail')
}

function analyseLabSample(s) {
  const issues = []
  const value = parseFloat(s.value), qcValue = parseFloat(s.qcValue)
  const ref = REF_RANGES[s.test]

  // ENGINE 1: Westgard QC
  if (!isNaN(qcValue)) {
    const history = STATE.samples.filter(x => x.test === s.test && x.instrument === s.instrument && x.qcValue !== undefined && !isNaN(parseFloat(x.qcValue)) && x.id !== s.id)
    if (history.length >= 5) {
      const qcs = history.map(h => parseFloat(h.qcValue))
      const mean = qcs.reduce((a, b) => a + b, 0) / qcs.length
      const sd = Math.sqrt(qcs.reduce((sum, v) => sum + (v - mean) ** 2, 0) / (qcs.length - 1)) || 0.0001
      const z = (qcValue - mean) / sd
      const cv = Math.abs(sd / mean) * 100
      const TH_13S = (STATE.thresholds && STATE.thresholds.westgard && STATE.thresholds.westgard.rule_1_3s) || 3
      const TH_12S = (STATE.thresholds && STATE.thresholds.westgard && STATE.thresholds.westgard.rule_1_2s) || 2
      if (Math.abs(z) > TH_13S) {
        issues.push({
          engine: 'Westgard 1₃S', source: 'QC Engine · Westgard 1₃S', severity: 'crit',
          title: `QC out of control on ${s.instrument} — ${s.test}`,
          description: `QC value ${qcValue.toFixed(3)} is ${z.toFixed(2)}SD from established mean (${mean.toFixed(3)} ± ${sd.toFixed(3)}). Westgard 1₃S rule violated — random analytical error.`,
          signals: [
            { label: 'QC value', value: qcValue.toFixed(3), tone: 'red' },
            { label: 'Mean', value: mean.toFixed(3), tone: 'blue' },
            { label: 'SD', value: sd.toFixed(3), tone: 'blue' },
            { label: 'Z-score', value: z.toFixed(2), tone: 'red' },
            { label: 'CV%', value: cv.toFixed(1) + '%', tone: cv > 5 ? 'amber' : 'blue' },
            { label: 'n', value: String(qcs.length), tone: 'blue' },
          ],
          insight: `${s.instrument} is producing values outside control limits for ${s.test}. Patient result for ${s.sampleId} cannot be trusted until QC is back in control.`,
          rootCause: [
            { stage: 'Processing', cause: 'Instrument may have analytical fault, miscalibration, or reagent failure' },
            { stage: 'Reagent', cause: `Lot ${s.lotNumber || 'unknown'} may be degraded, expired, or contaminated` },
            { stage: 'Environment', cause: 'Check temperature/humidity logs for the analyser bay' },
          ],
          actions: [
            `Hold the patient result for ${s.sampleId} — do not report`,
            'Repeat QC with fresh aliquot of control material',
            `Verify reagent lot ${s.lotNumber || '(specify)'} expiry, storage, and lot history`,
            'Check instrument maintenance log and recent service interventions',
            'If repeat fails, escalate to vendor and open a CAPA',
            'Document the rejection in the QC log',
          ],
        })
      } else if (Math.abs(z) > TH_12S) {
        issues.push({
          engine: 'Westgard 1₂S', source: 'QC Engine · Westgard 1₂S', severity: 'warn',
          title: `QC warning on ${s.instrument} — ${s.test}`,
          description: `QC value ${qcValue.toFixed(3)} exceeds 2SD (z = ${z.toFixed(2)}). Westgard 1₂S warning rule.`,
          signals: [
            { label: 'QC value', value: qcValue.toFixed(3), tone: 'amber' },
            { label: 'Z-score', value: z.toFixed(2), tone: 'amber' },
            { label: 'Mean ± SD', value: `${mean.toFixed(3)} ± ${sd.toFixed(3)}`, tone: 'blue' },
            { label: 'CV%', value: cv.toFixed(1) + '%', tone: cv > 5 ? 'amber' : 'blue' },
          ],
          insight: 'Single value exceeds 2SD. Westgard warning, not rejection — but if next run also exceeds 2SD on the same side (2₂S), that is a rejection event.',
          rootCause: [{ stage: 'Processing', cause: 'Possible early sign of drift or imprecision' }],
          actions: ['Continue with patient samples but flag for review', 'Run repeat QC if convenient', 'If next QC also exceeds 2SD, treat as 2₂S rejection'],
        })
      }
    }
  }

  // ENGINE 2: Reference Range / FP / FN
  if (ref && !isNaN(value) && s.resultType === 'Quantitative (numeric)') {
    const isCritical = value <= ref.critical_low || value >= ref.critical_high
    const isAbnormal = value < ref.min || value > ref.max
    if (isAbnormal && s.clinicalContext === 'Asymptomatic / screening') {
      s.flags = s.flags || {}; s.flags.suspectedFalsePositive = true
      issues.push({
        engine: 'FP Detection', source: 'Result Validation · FP Engine', severity: isCritical ? 'crit' : 'warn',
        title: `Possible false positive — ${s.test} abnormal in asymptomatic patient`,
        description: `Asymptomatic patient with ${s.test} = ${value} ${ref.unit} (reference: ${ref.min}–${ref.max}). Verification recommended before reporting.`,
        signals: [
          { label: 'Value', value: `${value} ${ref.unit}`, tone: 'red' },
          { label: 'Reference', value: `${ref.min}–${ref.max} ${ref.unit}`, tone: 'blue' },
          { label: 'Critical?', value: isCritical ? 'YES' : 'No', tone: isCritical ? 'red' : 'amber' },
          { label: 'Clinical context', value: 'Asymptomatic', tone: 'amber' },
        ],
        insight: 'Asymptomatic patients with abnormal results have higher pre-test probability of false positives. Common causes: pre-analytical issues (haemolysis, lipaemia, contamination), specimen mislabelling, calibration drift, reagent carry-over.',
        rootCause: [
          { stage: 'Pre-analytical', cause: 'Sample may be haemolysed, lipaemic, or contaminated' },
          { stage: 'Registration', cause: 'Possible patient/sample mismatch — verify ID against requisition' },
          { stage: 'Processing', cause: 'Instrument carry-over from previous high-value sample' },
          { stage: 'Reagent', cause: `Lot ${s.lotNumber || 'unknown'} may have positive bias` },
        ],
        actions: [
          'Request repeat sample before releasing the result',
          'Visually inspect original sample for haemolysis, lipaemia, icterus',
          'Verify patient ID matches requisition',
          'Check previous 3 samples on this instrument for very high values (carry-over risk)',
          'Cross-check against alternate method if available',
          'If repeat normal: report as preanalytical error',
        ],
      })
    }
    if (!isAbnormal && (s.clinicalContext === 'Symptomatic — fever' || s.clinicalContext === 'Symptomatic — infection suspected')) {
      s.flags = s.flags || {}; s.flags.suspectedFalseNegative = true
      issues.push({
        engine: 'FN Detection', source: 'Result Validation · FN Engine', severity: 'warn',
        title: `Possible false negative — symptomatic patient with normal ${s.test}`,
        description: `Patient is ${s.clinicalContext.toLowerCase()} but ${s.test} = ${value} ${ref.unit} is within reference range.`,
        signals: [
          { label: 'Value', value: `${value} ${ref.unit}`, tone: 'amber' },
          { label: 'Reference', value: `${ref.min}–${ref.max} ${ref.unit}`, tone: 'blue' },
          { label: 'Clinical context', value: s.clinicalContext, tone: 'amber' },
        ],
        insight: 'When clinical presentation suggests a condition but the test is normal, false negatives must be considered. Causes: timing (too early in disease), sample integrity (clotted, diluted, wrong tube), instrument sensitivity below threshold.',
        rootCause: [
          { stage: 'Pre-analytical', cause: 'Sample may have been collected too early in disease course' },
          { stage: 'Pre-analytical', cause: 'Wrong tube type, clotting, or dilution may mask analyte' },
          { stage: 'Processing', cause: 'Instrument may be below sensitivity threshold for low-positive samples' },
        ],
        actions: [
          'Discuss result with requesting clinician — confirm clinical suspicion',
          'Recommend repeat sample in 24–48 hours if suspicion remains',
          'Consider alternate or more sensitive method',
          'Verify sample tube type and integrity',
          'Document clinical-lab discordance for trend analysis',
        ],
      })
    }
    if (isCritical) {
      issues.push({
        engine: 'Critical Value', source: 'Result Validation · Critical Threshold', severity: 'crit',
        title: `CRITICAL value: ${s.test} = ${value} ${ref.unit}`,
        description: `Result for ${s.sampleId} at critical threshold. Immediate clinician notification protocol applies.`,
        signals: [
          { label: 'Value', value: `${value} ${ref.unit}`, tone: 'red' },
          { label: 'Critical low', value: `≤${ref.critical_low}`, tone: 'red' },
          { label: 'Critical high', value: `≥${ref.critical_high}`, tone: 'red' },
        ],
        insight: 'Critical values demand verification AND immediate clinician contact per standard lab protocol. Document read-back, time, and recipient.',
        rootCause: [{ stage: 'Result', cause: 'Result at life-threatening or treatment-altering threshold' }],
        actions: [
          'Verify the result by repeat analysis on the same sample',
          'If verified, contact requesting clinician immediately by phone',
          'Use read-back protocol (clinician repeats result back)',
          'Document: time of call, name of recipient, read-back confirmation',
          'Release result with "critical value" comment in LIS',
        ],
      })
    }
  }

  // ENGINE 3: Contamination / Carry-over
  if (!isNaN(value) && ref) {
    const sameInstrument = STATE.samples.filter(x => x.instrument === s.instrument && x.test === s.test && x.processedAt && x.id !== s.id).sort((a, b) => (b.processedAt || 0) - (a.processedAt || 0))
    if (sameInstrument.length > 0) {
      const prev = sameInstrument[0]
      const prevValue = parseFloat(prev.value)
      const minutesBetween = ((s.processedAt || Date.now()) - (prev.processedAt || 0)) / 60000
      if (!isNaN(prevValue) && prevValue >= ref.critical_high && value > ref.max && minutesBetween < 60 && s.clinicalContext === 'Asymptomatic / screening') {
        s.flags = s.flags || {}; s.flags.contamination = true
        issues.push({
          engine: 'Contamination', source: 'Contamination Engine · Carry-over', severity: 'warn',
          title: `Possible carry-over contamination on ${s.instrument}`,
          description: `Previous sample (${prev.sampleId}) had critical-high ${s.test} (${prevValue}); current sample also abnormal (${value}) within ${minutesBetween.toFixed(0)} minutes on same instrument.`,
          signals: [
            { label: 'Previous value', value: `${prevValue} ${ref.unit}`, tone: 'red' },
            { label: 'Current value', value: `${value} ${ref.unit}`, tone: 'amber' },
            { label: 'Time gap', value: `${minutesBetween.toFixed(0)}m`, tone: 'amber' },
            { label: 'Instrument', value: s.instrument, tone: 'blue' },
          ],
          insight: 'Carry-over contamination occurs when residual analyte from a high-value sample contaminates the next sample. Modern analysers minimise this with wash cycles, but failures can produce false-elevated downstream results.',
          rootCause: [
            { stage: 'Processing', cause: 'Instrument wash cycle may have failed or been skipped' },
            { stage: 'Processing', cause: 'Probe/needle may be partially blocked or worn' },
            { stage: 'Reagent', cause: `Cross-reactive substance in lot ${s.lotNumber || 'unknown'}` },
          ],
          actions: [
            'Repeat current sample after running 3 wash cycles',
            'Run a known-negative control immediately after the previous high sample',
            'Check instrument wash cycle log for the period',
            'Inspect probe/needle for blockage; service if indicated',
            'Retroactively review samples processed within 60 minutes of prior high sample',
          ],
        })
      }
    }
  }

  // ENGINE 5: Delta Check — implausible patient-level change
  if (!isNaN(value) && ref && s.patientId && s.test) {
    const priorPatientResults = STATE.samples
      .filter(x => x.patientId === s.patientId && x.test === s.test && x.id !== s.id && x.value !== undefined && !isNaN(parseFloat(x.value)) && x.processedAt)
      .sort((a, b) => (b.processedAt || 0) - (a.processedAt || 0))

    if (priorPatientResults.length > 0) {
      const prev = priorPatientResults[0]
      const prevValue = parseFloat(prev.value)
      const hoursBetween = ((s.processedAt || Date.now()) - (prev.processedAt || 0)) / 3600000

      // Delta-check thresholds (% change that is biologically implausible without intervention)
      const DELTA_LIMITS = (STATE.thresholds && STATE.thresholds.deltaCheck) || {
        'Sodium':     { pct: 5,  abs: 8,  hours: 24, hint: 'Sodium changes >8 mmol/L in 24h are rare without IV fluids or major event' },
        'Potassium':  { pct: 30, abs: 1.5, hours: 24, hint: 'Potassium delta >1.5 mmol/L often = haemolysis or drip-arm draw' },
        'Glucose':    { pct: 50, abs: 5,  hours: 6,  hint: 'Large glucose swings in <6h need clinical correlation' },
        'Hemoglobin': { pct: 15, abs: 2,  hours: 24, hint: 'Hb drop >2 g/dL in 24h = bleeding, haemolysis, or dilution' },
        'WBC':        { pct: 50, abs: 5,  hours: 24, hint: 'WBC delta >50% rapid = sepsis, treatment effect, or sample issue' },
        'Platelets':  { pct: 30, abs: 100, hours: 24, hint: 'Platelet drop >100 = consumption, EDTA clumping, or sample clot' },
        'Creatinine': { pct: 25, abs: 30, hours: 48, hint: 'Creatinine rise >30 μmol/L in 48h = AKI worth investigating' },
        'ALT':        { pct: 50, abs: 100, hours: 48, hint: 'ALT spike >100 U/L points to hepatic event or sample mix-up' },
        'CRP':        { pct: 100, abs: 50, hours: 24, hint: 'CRP doubling clinically informative; large drop = treatment response' },
        'CD4':        { pct: 30, abs: 200, hours: 168, hint: 'CD4 changes >30% in a week are unusual — verify sample' },
      }
      const limit = DELTA_LIMITS[s.test]
      if (limit && hoursBetween > 0 && hoursBetween <= limit.hours * 2) {
        const absDelta = Math.abs(value - prevValue)
        const pctDelta = prevValue !== 0 ? Math.abs((value - prevValue) / prevValue) * 100 : 0
        const exceedsAbs = absDelta > limit.abs
        const exceedsPct = pctDelta > limit.pct
        if (exceedsAbs && exceedsPct) {
          s.flags = s.flags || {}; s.flags.deltaCheckFail = true
          const direction = value > prevValue ? '↑ rising' : '↓ falling'
          const severity = (absDelta > limit.abs * 2 || pctDelta > limit.pct * 1.5) ? 'crit' : 'warn'
          issues.push({
            engine: 'Delta Check', source: 'Delta Engine · Patient-level change', severity,
            title: `Implausible ${s.test} change for ${s.patientId} — ${direction}`,
            description: `${s.test} for patient ${s.patientId} changed from ${prevValue} to ${value} ${ref.unit} in ${hoursBetween.toFixed(1)} hours (Δ ${absDelta.toFixed(2)} = ${pctDelta.toFixed(0)}%). This exceeds the biological plausibility threshold.`,
            signals: [
              { label: 'Previous', value: `${prevValue} ${ref.unit}`, tone: 'blue' },
              { label: 'Current', value: `${value} ${ref.unit}`, tone: 'red' },
              { label: 'Absolute Δ', value: `${absDelta.toFixed(2)} ${ref.unit}`, tone: 'red' },
              { label: 'Percent Δ', value: `${pctDelta.toFixed(0)}%`, tone: 'red' },
              { label: 'Time gap', value: `${hoursBetween.toFixed(1)}h`, tone: 'amber' },
              { label: 'Threshold', value: `±${limit.abs} ${ref.unit} / ${limit.pct}%`, tone: 'blue' },
            ],
            insight: `${limit.hint}. Delta-checks catch roughly 40% of preanalytical errors that QC alone misses — sample mix-ups, contamination, haemolysis, drip-arm draws, or clinical events worth investigating.`,
            rootCause: [
              { stage: 'Pre-analytical', cause: 'Possible haemolysis, contamination, or drip-arm draw' },
              { stage: 'Pre-analytical', cause: 'Possible wrong-tube draw or EDTA contamination (especially K, Ca, Mg)' },
              { stage: 'Registration', cause: 'Possible patient/sample mix-up — verify ID against the prior sample' },
              { stage: 'Clinical', cause: 'Genuine clinical change: AKI, bleeding, sepsis, treatment effect — correlate with notes' },
            ],
            actions: [
              `Visually inspect sample for haemolysis, lipaemia, or clotting`,
              `Verify patient ID matches the prior sample (${prev.sampleId}) on the requisition`,
              `Check whether the draw site was downstream of an IV line`,
              `Discuss with requesting clinician — is there a clinical event explaining the change?`,
              `If preanalytical suspected: request fresh sample before reporting`,
              `If clinically plausible: release with delta-check comment in LIS`,
              `Document in patient profile for trend awareness`,
            ],
          })
        }
      }
    }
  }

    // ENGINE 4: Entry Mismatch
  const otherSamples = STATE.samples.filter(x => x.id !== s.id)
  const mismatch = otherSamples.find(x => x.patientId === s.patientId && x.sampleId === s.sampleId && x.test !== s.test)
  if (mismatch) {
    s.flags = s.flags || {}; s.flags.entryMismatch = true
    issues.push({
      engine: 'Entry Mismatch', source: 'Entry Validator · Mismatch', severity: 'crit',
      title: `Entry mismatch: same Sample ID for different tests`,
      description: `Sample ID ${s.sampleId} for patient ${s.patientId} used for both "${s.test}" and "${mismatch.test}".`,
      signals: [
        { label: 'Sample ID', value: s.sampleId, tone: 'red' },
        { label: 'Patient', value: s.patientId, tone: 'red' },
        { label: 'This test', value: s.test, tone: 'red' },
        { label: 'Conflict test', value: mismatch.test, tone: 'red' },
      ],
      insight: 'A single sample ID should map to one test per patient encounter. Reuse indicates label printing error, requisition transcription error, or operator data-entry error.',
      rootCause: [
        { stage: 'Registration', cause: 'Sample ID was reused — likely manual transcription error' },
        { stage: 'Pre-analytical', cause: 'Two different specimens may have been labelled with the same ID' },
      ],
      actions: [
        'Stop processing — quarantine both samples',
        'Pull original requisitions and verify which sample ID belongs to which test',
        'Re-register the affected sample(s) with correct ID',
        'Investigate cause: barcode printer fault, manual transcription, or operator error',
        'Document the incident as a non-conformance',
      ],
    })
  }

  return issues
}

function generateRegistrationErrorCard(sample, error) {
  const severity = error.issue.includes('Duplicate') ? 'crit' : 'warn'
  return {
    id: uid(), ts: Date.now(), role: STATE.role, severity, source: 'Registration Validator',
    title: `${error.issue} — ${sample.sampleId}`, description: error.detail,
    signals: [
      { label: 'Sample ID', value: sample.sampleId, tone: 'red' },
      { label: 'Stage', value: error.stage, tone: 'amber' },
      { label: 'Issue', value: error.issue, tone: 'red' },
    ],
    insight: error.detail,
    rootCause: [{ stage: error.stage, cause: error.detail }],
    actions: ['Investigate the cause of the registration error', 'Correct the entry or re-register with proper data', 'Document the incident'],
    trace: `Registration[${sample.sampleId}] → Validator → Card`, sampleId: sample.id, acknowledged: false,
  }
}

// PREDICTIVE FAILURE ENGINE — the function user didn't know about
// Predicts WHICH instrument/lot/system will fail BEFORE results go bad
// ═══════════════════════════════════════════════════════════
function renderPredictive() {
  const cfg = ROLES[STATE.role]
  const predictions = computePredictions()

  $('page-predictive').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Predictive Failure Engine</div>
        <div class="page-sub">Forecasts where the next failure will originate · before patients are affected</div>
      </div>
    </div>

    <div class="predictive-card">
      <div class="predictive-head">
        <div class="predictive-icon">◉</div>
        <div>
          <div class="predictive-title">How this works</div>
          <div class="predictive-sub">Trend analysis · drift detection · failure horizon estimation</div>
        </div>
      </div>
      <div style="font-size:13px;color:var(--text);line-height:1.65">
        Most lab and operational errors are not random — they follow drift patterns that are visible <strong>before</strong> they cross failure thresholds. The Predictive Engine continuously analyses your data for early-warning signatures: QC values trending toward control limits, reagent lots showing consistent bias, instruments slowing down, wards drifting toward TAT failure, and participants showing pre-disengagement behaviour.
        <br><br>
        Each prediction includes a <strong>failure horizon</strong> — how soon JLIGHT estimates the failure will occur if no action is taken — and a <strong>confidence score</strong> based on the signal strength.
      </div>
    </div>

    ${predictions.length === 0 ? renderEmpty('No predictions yet', 'JLIGHT needs 5+ data points per ' + (STATE.role === 'Laboratory' ? 'instrument/test combination' : 'pattern') + ' to predict failures. Keep recording activity.', 'register', '+ New') : `
      <div class="section">
        <div class="section-head">
          <div>
            <div class="section-title">Active Predictions</div>
            <div class="section-sub">${predictions.length} forecast${predictions.length > 1 ? 's' : ''} · ranked by urgency</div>
          </div>
        </div>
        ${predictions.map(p => renderPrediction(p)).join('')}

function computePredictions() {
  const predictions = []

  if (STATE.role === 'Laboratory') {
    // Group samples by instrument+test
    const groups = {}
    STATE.samples.forEach(s => {
      if (!s.qcValue || isNaN(parseFloat(s.qcValue)) || !s.test || !s.instrument) return
      const key = `${s.instrument}|${s.test}`
      if (!groups[key]) groups[key] = []
      groups[key].push(s)
    })

    Object.keys(groups).forEach(key => {
      const samples = groups[key].sort((a, b) => a.processedAt - b.processedAt)
      if (samples.length < 5) return
      const [instrument, test] = key.split('|')
      const qcs = samples.map(s => parseFloat(s.qcValue))
      const mean = qcs.reduce((a, b) => a + b, 0) / qcs.length
      const sd = Math.sqrt(qcs.reduce((sum, v) => sum + (v - mean) ** 2, 0) / (qcs.length - 1)) || 0.0001

      // Linear regression on most recent 10
      const recent = qcs.slice(-10)
      const n = recent.length
      const xMean = (n - 1) / 2
      const yMean = recent.reduce((a, b) => a + b, 0) / n
      let num = 0, den = 0
      recent.forEach((v, i) => { num += (i - xMean) * (v - yMean); den += (i - xMean) ** 2 })
      const slope = den ? num / den : 0
      const driftPerRun = slope
      const sdPerRun = Math.abs(driftPerRun / sd)

      if (sdPerRun > 0.1) {
        const currentZ = (qcs[qcs.length - 1] - mean) / sd
        const direction = slope > 0 ? 'rising' : 'falling'
        const targetZ = direction === 'rising' ? 3 : -3
        const runsToFailure = Math.max(1, Math.ceil((targetZ - currentZ) / (slope / sd)))
        const validRuns = isFinite(runsToFailure) && runsToFailure > 0 && runsToFailure < 1000
        const urgency = validRuns && runsToFailure <= 5 ? 'high' : validRuns && runsToFailure <= 15 ? 'medium' : 'low'
        const confidence = Math.min(95, Math.round(50 + sdPerRun * 100))
        if (validRuns) {
          predictions.push({
            engine: 'QC Drift Predictor',
            icon: '↗',
            title: `${test} on ${instrument} — drifting toward control limit`,
            description: `${test} QC values on ${instrument} are drifting ${direction} at ${Math.abs(driftPerRun).toFixed(3)} units per run (≈ ${sdPerRun.toFixed(2)} SD/run). At current rate, control limit will be breached in approximately ${runsToFailure} runs.`,
            urgency, confidence,
            horizon: `~${runsToFailure} runs`,
            drift: direction.toUpperCase() + ' ' + (slope > 0 ? '↗' : '↘'),
            affected: `${instrument} · ${test}`,
            dataPoints: samples.length,
            actions: [
              'Schedule recalibration before the next run on this instrument',
              `Verify reagent lot stability — check open-vial expiry`,
              'Run a confirmation QC with fresh control material',
              'Document the trend and intended corrective action',
              urgency === 'high' ? 'Increase QC frequency until drift is corrected' : 'Monitor next 3 runs closely',
            ],
          })
        }
      }

      // Lot-specific bias detection
      const byLot = {}
      samples.forEach(s => { if (s.lotNumber) { (byLot[s.lotNumber] = byLot[s.lotNumber] || []).push(parseFloat(s.qcValue)) } })
      Object.keys(byLot).forEach(lot => {
        const lotQcs = byLot[lot]
        if (lotQcs.length < 4) return
        const lotMean = lotQcs.reduce((a, b) => a + b, 0) / lotQcs.length
        const bias = (lotMean - mean) / sd
        if (Math.abs(bias) > 1.5) {
          predictions.push({
            engine: 'Lot Bias Predictor',
            icon: '⊠',
            title: `Reagent lot ${lot} showing systematic bias`,
            description: `Lot ${lot} for ${test} on ${instrument} shows mean ${lotMean.toFixed(3)} vs overall ${mean.toFixed(3)} — bias of ${bias.toFixed(2)} SD. This lot is likely to trigger Westgard rule failures soon.`,
            urgency: Math.abs(bias) > 2.5 ? 'high' : 'medium',
            confidence: Math.min(90, Math.round(60 + Math.abs(bias) * 10)),
            horizon: '5–10 runs',
            drift: bias > 0 ? 'POSITIVE BIAS' : 'NEGATIVE BIAS',
            affected: `Lot ${lot} · ${test}`,
            dataPoints: lotQcs.length,
            actions: [
              `Quarantine the suspect aliquots of lot ${lot}`,
              'Switch to a different lot if available',
              'Notify reagent supplier with lot number and bias data',
              'Document the lot performance for procurement records',
              'Run new lot validation before deploying replacement',
            ],
          })
        }
      })
    })

    // Instrument health score (combining drift, error rate, contamination flags)
    const byInstrument = {}
    STATE.samples.forEach(s => {
      if (!s.instrument || !s.processedAt) return
      const inst = s.instrument
      if (!byInstrument[inst]) byInstrument[inst] = { total: 0, flagged: 0, contam: 0 }
      byInstrument[inst].total++
      if (s.flags && Object.keys(s.flags).length > 0) byInstrument[inst].flagged++
      if (s.flags && s.flags.contamination) byInstrument[inst].contam++
    })
    Object.keys(byInstrument).forEach(inst => {
      const d = byInstrument[inst]
      if (d.total < 5) return
      const flagRate = d.flagged / d.total
      const contamRate = d.contam / d.total
      const healthScore = Math.max(0, 100 - flagRate * 70 - contamRate * 100)
      if (healthScore < 70) {
        predictions.push({
          engine: 'Instrument Health Predictor',
          icon: '⚠',
          title: `${inst} — declining health score`,
          description: `${inst} has flagged ${d.flagged}/${d.total} samples (${(flagRate * 100).toFixed(0)}%), with ${d.contam} contamination events. Composite health score: ${healthScore.toFixed(0)}/100. Without intervention, more samples will be affected.`,
          urgency: healthScore < 50 ? 'high' : 'medium',
          confidence: Math.min(85, 50 + d.total * 2),
          horizon: healthScore < 50 ? 'Days' : '1–2 weeks',
          drift: 'DECLINING',
          affected: inst,
          dataPoints: d.total,
          actions: [
            `Schedule preventive maintenance for ${inst}`,
            'Review and re-run wash cycles',
            'Inspect probe, sample needle, and cuvettes for wear',
            'Check temperature controls and humidity logs',
            'Recalibrate using current calibrators',
            'Consider running a method validation if score continues to decline',
          ],
        })
      }
    })
  } else if (STATE.role === 'Trial') {
    // Predict participants at risk of LTFU
    const byParticipant = {}
    STATE.entries.forEach(e => { if (e.participantId) { (byParticipant[e.participantId] = byParticipant[e.participantId] || []).push(e) } })
    Object.keys(byParticipant).forEach(pid => {
      const visits = byParticipant[pid].sort((a, b) => a.ts - b.ts)
      if (visits.length < 2) return
      const noShows = visits.filter(v => v.attended === 'No — missed').length
      const recent3 = visits.slice(-3)
      const recentNoShows = recent3.filter(v => v.attended === 'No — missed').length
      const distance = parseFloat(visits[0].distance) || 0
      let riskScore = 0
      riskScore += noShows * 25
      riskScore += recentNoShows * 20
      riskScore += distance > 30 ? 15 : 0
      if (visits[visits.length - 1].attended === 'Withdrew') riskScore = 100
      if (riskScore >= 40) {
        predictions.push({
          engine: 'LTFU Risk Predictor', icon: '◌',
          title: `${pid} — high risk of loss-to-follow-up`,
          description: `Participant ${pid} has missed ${noShows}/${visits.length} visits (${recentNoShows} of last 3). Risk score ${riskScore}/100. Without intervention, withdrawal is likely within next visit cycle.`,
          urgency: riskScore >= 70 ? 'high' : 'medium',
          confidence: Math.min(90, 60 + visits.length * 5),
          horizon: 'Next visit cycle',
          drift: 'DISENGAGING',
          affected: pid,
          dataPoints: visits.length,
          actions: [
            'Schedule home visit by community study coordinator within 7 days',
            'Phone contact within 48 hours · document barriers',
            distance > 20 ? 'Arrange transport voucher or coordinate site transport' : 'Verify contact details and reminder method',
            'Discuss continued participation at next site monitor visit',
            'Document retention strategy in CRF',
          ],
        })
      }
    })
  } else if (STATE.role === 'Hospital') {
    // Predict ward TAT failures
    const byWard = {}
    STATE.entries.forEach(e => {
      if (!e.ward || !e.priority || isNaN(parseFloat(e.tatHours))) return
      const key = `${e.ward}|${e.priority}`
      if (!byWard[key]) byWard[key] = []
      byWard[key].push(e)
    })
    Object.keys(byWard).forEach(key => {
      const events = byWard[key].sort((a, b) => a.ts - b.ts)
      if (events.length < 5) return
      const [ward, priority] = key.split('|')
      const thresholds = (STATE.thresholds && STATE.thresholds.tat) || { Stat: 1, Urgent: 4, Routine: 24 }
      const threshold = thresholds[priority] || 24
      const tats = events.map(e => parseFloat(e.tatHours))
      const avg = tats.reduce((a, b) => a + b, 0) / tats.length
      const recent = tats.slice(-5)
      const recentAvg = recent.reduce((a, b) => a + b, 0) / recent.length
      const trend = recentAvg - avg
      if (recentAvg > threshold * 0.7 && trend > 0) {
        const runsToBreach = Math.max(1, Math.ceil((threshold - recentAvg) / Math.max(0.1, trend / 5)))
        predictions.push({
          engine: 'TAT Failure Predictor', icon: '⏱',
          title: `${ward} (${priority}) — approaching TAT threshold`,
          description: `${ward} ${priority} TAT averaging ${recentAvg.toFixed(1)}h (threshold ${threshold}h). Trend rising at ${trend.toFixed(2)}h per 5 events. Threshold breach predicted in ~${runsToBreach} events.`,
          urgency: recentAvg / threshold > 0.85 ? 'high' : 'medium',
          confidence: Math.min(85, 50 + events.length * 3),
          horizon: `~${runsToBreach} events`,
          drift: 'RISING',
          affected: `${ward} · ${priority}`,
          dataPoints: events.length,
          actions: [
            `Review ${ward} ${priority} workflow capacity`,
            'Check upstream specimen transport bottlenecks',
            'Verify lab processing capacity for this priority',
            'Pre-emptive communication with ward staff',
            'Open preventive CAPA before threshold is breached',
          ],
        })
      }
    })
  }

  return predictions.sort((a, b) => {
    const order = { high: 0, medium: 1, low: 2 }
    return (order[a.urgency] || 3) - (order[b.urgency] || 3)
  })
}
